<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmallCreek: The Wooden Soup - Final Pro Master</title>
    <style>
        :root { --en: #a5f3fc; --go: #fbbf24; --ac: #d8b4fe; --ui: rgba(15, 23, 42, 0.96); --sc: rgba(30, 27, 75, 0.85); }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: url('https://i.ibb.co/ZzwMRrb0/Chat-GPT-Image-16-jun-2026-10-48-02.png') center/cover no-repeat !important; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; }
        #game-wrapper { display: flex; width: 100%; height: 100%; position: relative; transition: filter 0.8s; }
        #white-out { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 100000; transition: opacity 0.5s; }
        
        /* --- HUD --- */
        #hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; z-index: 5000; background: rgba(0,0,0,0.6); padding: 12px 40px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid #fff2; pointer-events: none; }
        #score-box { font-family: 'Courier New', monospace; font-size: 2.2rem; color: var(--en); text-shadow: 0 0 10px #22d3ee; font-weight: bold; }
        #shard-box { font-size: 1.4rem; color: var(--go); align-self: center; font-weight: bold; }
        #cps-tag { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); font-size: 1.1rem; color: var(--ac); z-index: 5000; text-transform: uppercase; font-weight: bold; }

        /* --- STAGE (LOCKED COORDINATES) --- */
        #main-stage { flex-grow: 1; position: relative; cursor: pointer; overflow: hidden; height: 100vh; }
        #sticky-center { position: absolute; left: 50%; top: 50%; width: 10px; height: 10px; }
        #asset-chef { position: absolute; z-index: 1; left: 0px; top: -40px; width: 720px; transform: translate(-50%, -50%); pointer-events: none; }
        #asset-soup { position: absolute; z-index: 2; left: 70px; top: 250px; width: 1250px; transform: translate(-50%, -50%); pointer-events: none; }
        #spoon-rig { position: absolute; z-index: 3; left: -95px; top: 5px; width: 840px; transform: translate(-50%, -50%) rotate(-27deg); transform-origin: 85% 15%; pointer-events: none; }
        #asset-spoon { width: 100%; transition: transform 0.1s; transform-origin: inherit; }

        /* --- SIDEBAR & SHOP --- */
        #lore-scroll { position: absolute; top: 20px; left: 20px; width: 340px; background: var(--sc); border: 2px solid var(--ac); border-radius: 15px; padding: 15px; z-index: 8000; backdrop-filter: blur(10px); }
        #companion-column { position: absolute; left: 20px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 4000; pointer-events: none; }
        .companion-slot { position: relative; width: 95px; height: 95px; background: rgba(255,255,255,0.05); border: 1px solid var(--ac); border-radius: 20px; display: flex; justify-content: center; align-items: center; }
        .slot-img { width: 85%; height: 85%; object-fit: contain; animation: bob 3s infinite; }
        .lv-badge { position: absolute; bottom: -5px; right: -5px; background: #2e1065; border: 2px solid var(--go); border-radius: 6px; padding: 1px 5px; font-size: 0.65rem; font-weight: bold; color: var(--go); z-index: 20; }
        .slot-crown { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; filter: drop-shadow(0 0 5px var(--go)); z-index: 30; }
        
        #side-shop { width: 380px; background: var(--ui); border-left: 1px solid #fff2; backdrop-filter: blur(25px); padding: 20px; z-index: 6000; overflow-y: auto; }
        #prix-btn-sidebar { padding: 15px; background: linear-gradient(135deg, #7e22ce, #3b82f6); border-radius: 12px; font-weight: bold; text-align: center; cursor: not-allowed; border: 2px solid #fff; margin-bottom: 20px; opacity: 0.4; transition: 0.3s; font-size: 0.9rem; text-transform: uppercase; }
        #prix-btn-sidebar.unlocked { opacity: 1; cursor: pointer; box-shadow: 0 0 15px #3b82f6; }

        .companion-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-bottom: 12px; cursor: not-allowed; border: 2px solid transparent; display: flex; align-items: center; opacity: 0.4; transition: 0.3s; }
        .companion-card.affordable { opacity: 1; cursor: pointer; border-color: var(--ac); background: rgba(168, 85, 247, 0.1); }
        .comp-img { width: 60px; height: 60px; border-radius: 10px; margin-right: 12px; object-fit: cover; }
        .champ-banner { color: var(--go); font-weight: bold; font-size: 0.7rem; display: block; margin-top: 3px; }

        /* --- PRESTIGE --- */
        #altar-panel { position: absolute; top: 20px; right: 400px; z-index: 7000; display: flex; flex-direction: column; align-items: center; }
        #btn-prestige { background-image: url("https://i.ibb.co/35Vpc7b2/Dise-o-sin-t-tulo-1.png") !important; background-size: contain !important; background-repeat: no-repeat !important; background-position: center !important; width: 180px; height: 260px; border: none; background-color: transparent; transition: 0.4s; cursor: not-allowed; opacity: 0.4; display: flex; flex-direction: column; justify-content: flex-end; }
        #btn-prestige.unlocked { opacity: 1.0; cursor: pointer; filter: drop-shadow(0 0 20px var(--go)); animation: breathe 2s infinite alternate; }

        /* --- CINEMATICS --- */
        #victory-cinema { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 90000; display: none; align-items: center; justify-content: center; pointer-events: none; }
        #cinema-plushie { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(1.6); width: 300px; height: 300px; object-fit: contain; filter: drop-shadow(0 0 30px var(--ac)); }
        #cinema-crown { position: absolute; top: -150px; left: 50%; transform: translateX(-50%) scale(2.2); font-size: 4rem; transition: top 1s cubic-bezier(0.47, 0, 0.745, 0.715); z-index: 90001; }
        #prestige-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 80000; display: none; opacity: 0; background: linear-gradient(180deg, #020617 0%, #1e1b4b 50%, #2e1065 100%); flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s; }
        #angel-showcase { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 85000; pointer-events: none; transition: 1.2s; max-width: 80vw; max-height: 70vh; object-fit: contain; }
        #angel-showcase.active { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 60px var(--go)) brightness(1.5); }

        /* --- RACE MODAL --- */
        #race-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1e1b4b 0%, #000 100%); z-index: 100000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #race-track { width: 800px; height: 65vh; background: rgba(255,255,255,0.05); border: 4px solid var(--accent); display: flex; position: relative; border-radius: 20px; overflow: hidden; }
        .lane { flex: 1; border-right: 2px dashed #fff3; position: relative; }
        .racer-img { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; object-fit: contain; transition: bottom 0.1s linear; }
        .btn-prix-return { pointer-events: auto !important; cursor: pointer !important; background: #ef4444 !important; color: #fff !important; padding: 15px 40px !important; border-radius: 50px !important; border: 2px solid #fff !important; font-weight: bold !important; margin-top: 30px !important; text-transform: uppercase; z-index: 110000; position: relative; }

        .summon-clone { position: fixed; z-index: 30000; pointer-events: none; transition: all 1s cubic-bezier(0.19, 1, 0.22, 1); filter: drop-shadow(0 0 25px var(--ac)); object-fit: contain; max-width: 300px; max-height: 25vh; }
        .summon-active { transform: translate(-50%, -50%) scale(1.5) rotate(360deg) !important; }
        
        @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes breathe { from { transform: scale(1); } to { transform: scale(1.05); } }
        .shake { animation: s 0.3s; } @keyframes s { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>
    <div id="white-out"></div>
    <img id="angel-showcase" src="https://i.ibb.co/35Vpc7b2/Dise-o-sin-t-tulo-1.png">
    <div id="victory-cinema"><div id="cinema-crown">👑</div><img id="cinema-plushie" src=""></div>
    <div id="prestige-overlay"><h1 style="color:var(--go); font-size:4rem; text-shadow:0 0 30px var(--go);">[ SOUL AWAKENED ]</h1><p id="pres-lore" style="max-width:600px; text-align:center; font-size:1.4rem; line-height:1.6; margin:20px;"></p></div>

    <div id="race-modal">
        <h1 style="color:var(--go); letter-spacing:4px; margin-bottom: 5px;">THE GRAND PRIX</h1>
        <div id="prix-sel-ui" style="text-align:center;"><p style="font-size:1.5rem;">Select your Champion!</p><div id="p-list-ui" style="display:flex; gap:20px; justify-content:center; margin-top:20px;"></div></div>
        <div id="prix-run-ui" style="display:none; width:100%; flex-direction:column; align-items:center;">
            <div id="race-track" onmousedown="prix.pClick()">
                <div style="position:absolute; top:30px; width:100%; height:15px; background:repeating-linear-gradient(90deg,#fff,#000 20px);"></div>
                <div class="lane" id="lane-0"></div><div class="lane" id="lane-1"></div><div class="lane" id="lane-2"></div><div class="lane" id="lane-3"></div>
            </div>
            <div id="prix-timer-ui" style="font-size:8rem; color:var(--go); position:absolute; top:50%; text-shadow:0 0 20px #000"></div>
        </div>
        <div id="prix-end-ui" style="display:none; text-align:center;">
            <h2 id="prix-rank-txt" style="font-size:3rem; color:#fff;"></h2><p id="prix-reward-msg" style="color:var(--go); font-size:1.4rem;"></p>
            <button class="btn-prix-return" onclick="prix.ret()">RETURN TO CAULDRON</button>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="hud"><div id="score-box">Energy Balls: <span id="score">0</span></div><div id="shard-box">Angel Shards: <span id="s-count">0</span></div></div>
        <div id="cps-tag">0.0 EB PER SECOND</div>
        <div id="lore-scroll"><div id="lore-title">CHRONICLE</div><div id="lore-text">Connecting...</div></div>
        <div id="companion-column"></div>
        <div id="altar-panel"><div id="btn-prestige" onclick="game.pres()"><div class="prestige-label" id="pres-txt">LOCKED</div></div><div id="pres-stat">Lv. 0 (+0%)</div></div>
        <section id="main-stage" onmousedown="game.click(event)">
            <canvas id="particle-canvas"></canvas>
            <div id="sticky-center">
                <img id="asset-chef" src="https://i.ibb.co/KjSyjHsj/chef-png.png">
                <img id="asset-soup" src="https://i.ibb.co/s9CgLx2n/soup-png.png">
                <div id="spoon-rig"><img id="asset-spoon" src="https://i.ibb.co/RTwhRpz3/spoon-png.png"></div>
            </div>
        </section>
        <aside id="side-shop"><h1 style="text-align:center; font-size:1.3rem;">SHOP</h1><div id="prix-btn-sidebar" onclick="prix.open()">Enter Grand Prix</div><div id="companion-list"></div></aside>
    </div>

    <audio id="audio-stir" src="wood_stir_asmr.mp3" preload="auto"></audio>

    <script>
        const game = {
            energy:0, lifetimeEnergy:0, shards:0, cps:0, paused:false, phase:0, clicking:false, cooldown:0, _inited:false, logicTick:null, uiTick:null, saveTick:null,
            companions: [
                {id:0, name:'Coco Octopus', cost:15, pow:1, level:0, isChampion:false, img:'https://i.ibb.co/qMhJR7Hz/Coco-the-Mystic-Octopus.png'},
                {id:1, name:'Baby Bunny Guide', cost:100, pow:8, level:0, isChampion:false, img:'https://i.ibb.co/r2Nzrxj8/baby-bunny-guide-png.png'},
                {id:2, name:'Pio Pio Healing', cost:1100, pow:45, level:0, isChampion:false, img:'https://i.ibb.co/4ZqBPXNG/pio-pio-healing-png.png'},
                {id:3, name:'Ivan Guardian Bear', cost:12000, pow:260, level:0, isChampion:false, img:'https://i.ibb.co/LDZxCSvh/Ivan-the-Guardian-Bear.png'}
            ],
            init() {
                if (this._inited) return;
                this._inited = true;
                this.ctx = document.getElementById('particle-canvas').getContext('2d'); this.resize(); window.onresize=()=>this.resize();
                this.load(); this.render();
                if (this.logicTick) clearInterval(this.logicTick);
                if (this.uiTick) clearInterval(this.uiTick);
                if (this.saveTick) clearInterval(this.saveTick);
                this.logicTick = setInterval(()=>!this.paused && this.logic(), 1000);
                this.uiTick = setInterval(()=>!this.paused && this.ui(), 100);
                this.saveTick = setInterval(()=>this.save(), 5000);
                this.loop();
            },
            resize() { this.ctx.canvas.width = window.innerWidth; this.ctx.canvas.height = window.innerHeight; },
            save() { localStorage.setItem('soup_pro_final_v9', JSON.stringify({e:this.energy, l:this.lifetimeEnergy, s:this.shards, c:this.companions.map(x=>({lv:x.level, ch:x.isChampion})), cd:this.cooldown})); },
            load() { const d = JSON.parse(localStorage.getItem('soup_pro_final_v9')); if(d){this.energy=d.e; this.lifetimeEnergy=d.l; this.shards=d.s; this.cooldown=d.cd; d.c.forEach((x,i)=>{if(this.companions[i]){this.companions[i].level=x.lv; this.companions[i].isChampion=x.ch;}});} this.rebuild(); },
            rebuild() { const col = document.getElementById('companion-column'); col.innerHTML = ''; this.companions.forEach(c => { if(c.level>0) this.slot(c); }); },
            slot(c) {
                let s = document.getElementById(`slot-${c.id}`);
                if (!s) { s = document.createElement('div'); s.id = `slot-${c.id}`; s.className = 'companion-slot'; document.getElementById('companion-column').appendChild(s); }
                s.innerHTML = `<img src="${c.img}" class="slot-img"><div class="lv-badge">Lv. ${c.level}</div>${c.isChampion?'<div class="slot-crown">👑</div>':''}`; return s;
            },
            logic() {
                let base = 0; this.companions.forEach(c => { base += (c.level * c.pow * (1 + this.shards*0.5) * (c.isChampion?2:1)); });
                this.cps = base * (1 + (this.companions[2].level * 0.15)); this.energy += this.cps; this.lifetimeEnergy += this.cps; if(this.cooldown > 0) this.cooldown--;
            },
            ui() {
                document.getElementById('score').innerText = Math.floor(this.energy).toLocaleString();
                document.getElementById('s-count').innerText = this.shards;
                document.getElementById('cps-tag').innerText = `${this.cps.toFixed(1)} EB PER SECOND`;
                let g = 25e6 * Math.pow(5, this.shards); let b = document.getElementById('btn-prestige');
                b.className = this.energy >= g ? 'unlocked' : 'locked'; document.getElementById('pres-txt').innerText = this.energy >= g ? "[ AWAKEN SOUL ]" : `Requires ${g.toLocaleString()} EB`;
                document.getElementById('pres-stat').innerText = `Awakening Lv. ${this.shards} (+${this.shards*50}%)`;
                this.updateLore();
                const ps = document.getElementById('prix-btn-sidebar'); 
                if(this.companions[0].level > 0) { ps.style.display = 'block'; if(this.cooldown <= 0) { ps.className = 'unlocked'; ps.innerText = "Enter Grand Prix"; } else { ps.className = 'cooldown-active'; ps.innerText = `${Math.floor(this.cooldown/60)}:${(this.cooldown%60).toString().padStart(2,'0')}`; } }
                else { ps.style.display = 'none'; }
                document.querySelectorAll('.companion-card').forEach((c, i) => c.className = `companion-card ${this.energy >= this.companions[i].cost ? 'affordable' : ''}`);
            },
            updateLore() {
                const lr = ["Skullchef has arrived from Esquelotia to heal Earth.", "The entity stole Esquelotia's compassion.", "Small Angel sacrificed his life to heal his planet.", "Skullchef uses the ingredients infused with soul.", "The soup is ready. Activate the Awakening.", "Success. Small Angel is integrated into Earth."];
                let t = "", ti = "";
                if (this.shards === 0) {
                    if (this.lifetimeEnergy < 1000) { t = lr[0]; ti = "Chronicle 1"; }
                    else if (this.lifetimeEnergy < 50000) { t = lr[1]; ti = "Chronicle 2"; }
                    else if (this.lifetimeEnergy < 500000) { t = lr[2]; ti = "Chronicle 3"; }
                    else { t = lr[4]; ti = "Chronicle 4"; }
                } else { t = `Era ${this.shards}: Infinite Ascension. Your legacy is eternal.`; ti = `Era ${this.shards}`; }
                document.getElementById('lore-text').innerText = t; document.getElementById('lore-title').innerText = ti;
            },
            click(ev) {
                if(this.paused || this.clicking || ev.target.closest('#side-shop') || ev.target.closest('#altar-panel')) return;
                const exp = Math.min(this.companions[1].level * (this.companions[1].isChampion ? 2 : 1), 40);
                const gain = Math.pow(2, exp) * (1 + this.shards * 0.5);
                if (!Number.isFinite(gain) || gain <= 0) return;
                this.clicking = true; this.energy += gain;
                const a = document.getElementById('audio-stir').cloneNode(); a.volume = 0.3; a.play().catch(()=>{});
                const spr = document.getElementById('asset-spoon'); spr.style.transform = "translate(-50%, -50%) rotate(15deg)";
                setTimeout(() => { spr.style.transform = "translate(-50%, -50%) rotate(-27deg)"; this.clicking = false; }, 120);
                this.part(window.innerWidth/2, window.innerHeight/2+100, 'energy');
            },
            buyCompanion(i, ev) {
                const c = this.companions[i];
                if (this.energy >= c.cost) {
                    const rect = ev.currentTarget.getBoundingClientRect();
                    this.energy -= c.cost; c.level++; c.cost = Math.floor(c.cost * 1.35);
                    const h = document.createElement('img'); h.src = c.img; h.className = 'summon-clone'; h.style.left=rect.left+'px'; h.style.top=rect.top+'px'; h.style.transform='scale(0.2)'; document.body.appendChild(h);
                    setTimeout(() => { 
                        h.style.left='50%'; h.style.top='45%'; h.style.transform='translate(-50%,-50%) scale(1.5) rotate(360deg)'; this.part(window.innerWidth/2, window.innerHeight/2, 'magic');
                        setTimeout(() => { let s = this.slot(c); let sr = s.getBoundingClientRect(); h.style.left = sr.left+45+'px'; h.style.top = sr.top+45+'px'; h.style.transform = 'translate(-50%,-50%) scale(0.35) rotate(0deg)'; setTimeout(() => h.remove(), 1000); }, 1500);
                    }, 50); this.render();
                }
            },
            pres() {
                let g = 25e6 * Math.pow(5, this.shards); if (this.energy < g) { document.getElementById('btn-prestige').classList.add('shake'); setTimeout(()=>document.getElementById('btn-prestige').classList.remove('shake'), 300); return; }
                this.paused = true; document.getElementById('angel-showcase').classList.add('active'); this.part(window.innerWidth/2, window.innerHeight/2, 'magic');
                setTimeout(() => {
                    showcase.classList.remove('active'); const o = document.getElementById('prestige-overlay');
                    document.getElementById('pres-lore').innerText = "The soul has ascended. Earth is purified."; o.style.display = 'flex'; setTimeout(()=>o.style.opacity='1', 20);
                    setTimeout(() => {
                        this.shards++; this.energy = 0; this.lifetimeEnergy = 0;
                        this.companions.forEach(c => { c.level = 0; c.isChampion = false; c.cost = (c.id === 0 ? 15 : (c.id === 1 ? 100 : (c.id === 2 ? 1100 : 12000))); });
                        this.rebuild(); this.render(); o.style.opacity = '0'; setTimeout(()=>{o.style.display='none'; this.paused=false;}, 500);
                    }, 3000);
                }, 2000);
            },
            coron(c) {
                this.paused = true; const v = document.getElementById('victory-cinema'), p = document.getElementById('cinema-plushie'), cr = document.getElementById('cinema-crown');
                p.src = c.img; v.style.display = 'flex'; cr.style.top = '-150px';
                setTimeout(() => { cr.style.top = '31%'; setTimeout(() => { document.body.style.filter = 'brightness(2.5)'; setTimeout(()=>document.body.style.filter='none',150); }, 1100);
                    setTimeout(() => { v.style.display = 'none'; cr.style.top = '-150px'; this.paused = false; this.rebuild(); this.render(); }, 3500);
                }, 100);
            },
            loop() {
                const sp = document.getElementById('spoon-rig'), so = document.getElementById('asset-soup');
                if(!this.paused && this.cps > 0 && !this.clicking) {
                    this.phase += (0.04 + Math.log10(this.cps+1)*0.05);
                    sp.style.transform = `translate(-50%, -50%) rotate(${-27+Math.sin(this.phase)*5}deg)`;
                    so.style.transform = `translate(-50%, -50%) scaleY(${1+Math.sin(this.phase)*0.012})`;
                }
                this.partLoop(); requestAnimationFrame(()=>this.loop());
            },
            render() {
                const l = document.getElementById('companion-list'); l.innerHTML = '';
                this.companions.forEach((c, i) => {
                    const cd = document.createElement('div'); cd.className = `companion-card ${this.energy >= c.cost ? 'affordable' : ''}`; cd.onclick = (e) => this.buyCompanion(i, e);
                    let powerVal = c.pow * (1 + this.shards * 0.5); let d = c.id === 2 ? `+${powerVal.toFixed(1)}% Prod` : `+${powerVal.toFixed(1)} EB/s`;
                    let angelText = this.shards > 0 ? `<br><span style="color:#4ade80; font-size:0.6rem;">(+${this.shards*50}% Angel Power!)</span>` : '';
                    cd.innerHTML = `<img src="${c.img}" class="comp-img"><div style="flex:1"><b>${c.name} (${c.level})</b><div style="font-size:0.7rem;color:#cbd5e1">${d}${angelText}</div>${c.isChampion?'<span class="champ-banner">👑 CHAMPION (x2!)</span>':''}<span style="color:#fbbf24;font-weight:bold;display:block;">${Math.floor(c.cost).toLocaleString()} EB</span></div>`; l.appendChild(cd);
                });
            },
            particles: [],
            part(x, y, t) { for(let i=0; i<(t==='magic'?30:8); i++) this.particles.push({ x, y, t, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10-(t==='energy'?5:0), life:1, size:Math.random()*8+4, color:t==='magic'?(Math.random()>0.5?'#fff':'#fbbf24'):'#a5f3fc' }); },
            partLoop() { this.ctx.clearRect(0,0,this.ctx.canvas.width,this.ctx.canvas.height); this.particles.forEach((p, i) => { if(p.t==='energy') { p.vx+=(window.innerWidth/2-p.x)*0.003; p.vy+=(60-p.y)*0.003; } p.x+=p.vx; p.y+=p.vy; p.life-=0.015; this.ctx.fillStyle=p.color; this.ctx.globalAlpha=p.life; this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill(); if(p.life<=0) this.particles.splice(i,1); }); }
        };
        const prix = {
            a:false, rs:[], tk:null, cdIv:null, ch:null, w:false,
            open() { if(game.cooldown > 0 || game.companions[0].level === 0) return; game.paused = true; document.getElementById('race-modal').style.display='flex'; document.getElementById('prix-sel-ui').style.display='block'; document.getElementById('prix-run-ui').style.display='none'; document.getElementById('p-end-ui').style.display='none';
                const l = document.getElementById('p-list-ui'); l.innerHTML = '';
                game.companions.filter(c => c.level > 0).forEach(c => { const d = document.createElement('div'); d.style="background:#fff1; padding:10px; border-radius:10px; cursor:pointer; text-align:center;"; d.innerHTML = `<img src="${c.img}" style="width:80px;"><p>${c.name}</p>`; d.onclick = () => this.start(c); l.appendChild(d); });
            },
            start(c) {
                if (this.tk) { clearInterval(this.tk); this.tk = null; }
                if (this.cdIv) { clearInterval(this.cdIv); this.cdIv = null; }
                this.a = false; this.ch = c; document.getElementById('prix-sel-ui').style.display='none'; document.getElementById('prix-run-ui').style.display='flex';
                for(let i=0; i<4; i++) document.getElementById(`lane-${i}`).innerHTML = '';
                this.rs = [{id:c.id, pos:0, im:c.img, isP:true, lane:0}, ...game.companions.filter(co=>co.id!==c.id).map((co,i)=>({id:co.id, pos:0, im:co.img, isP:false, lane:i+1}))];
                this.rs.forEach(r => { const im = document.createElement('img'); im.id=`r-${r.lane}`; im.src=r.im; im.className='racer-img'; document.getElementById(`lane-${r.lane}`).appendChild(im); });
                let t = 3; const b = document.getElementById('prix-timer-ui');
                this.cdIv = setInterval(() => { b.innerText = t > 0 ? t : "GO!"; if(t < 0) { clearInterval(this.cdIv); this.cdIv = null; b.innerText = ""; this.begin(); } t--; }, 1000);
            },
            begin() { if (this.tk) clearInterval(this.tk); this.a = true; this.tk = setInterval(() => { this.rs.slice(1).forEach(r => r.pos += Math.random()*3.5); this.upd(); this.check(); }, 100); },
            pClick() { if(this.a) { this.rs[0].pos += 8; this.upd(); } },
            upd() { this.rs.forEach(r => { const el = document.getElementById(`r-${r.lane}`); if(el) el.style.bottom = (10+(r.pos/100)*75)+'%'; }); },
            check() { const w = this.rs.find(r => r.pos >= 100); if(w) { this.a = false; clearInterval(this.tk); this.w = w.isP; this.end(); } },
            end() { document.getElementById('prix-run-ui').style.display='none'; document.getElementById('p-end-ui').style.display='block';
                const r = document.getElementById('prix-rank-txt'), m = document.getElementById('prix-reward-msg'); if(this.w) { r.innerText="1ST PLACE!"; m.innerText=`VICTORY! Return to crown ${this.ch.name}!`; this.ch.isChampion = true; }
                else { let p = Math.floor(25e6 * Math.pow(5, game.shards) * 0.01); r.innerText="DEFEAT!"; m.innerText=`Awarded +${p.toLocaleString()} EB!`; game.energy += p; }
                game.render(); game.cooldown = 600;
            },
            ret() { if(this.tk) { clearInterval(this.tk); this.tk = null; } if(this.cdIv) { clearInterval(this.cdIv); this.cdIv = null; } document.getElementById('race-modal').style.display='none'; if(this.w) game.coron(this.ch); else game.paused = false; }
        };
        window.onload = () => game.init();
    </script>
</body>
