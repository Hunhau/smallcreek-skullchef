<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmallCreek: The Wooden Soup - Final Master</title>
    <style>
        :root {
            --energy-color: #a5f3fc;
            --energy-glow: 0 0 15px #22d3ee;
            --gold-color: #fbbf24;
            --gold-glow: 0 0 25px #f59e0b;
            --accent: #d8b4fe;
            --ui-bg: rgba(15, 23, 42, 0.96);
            --scroll-bg: rgba(30, 27, 75, 0.85);
        }

        /* --- GLOBAL & BACKGROUND --- */
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-image: url('https://i.ibb.co/ZzwMRrb0/Chat-GPT-Image-16-jun-2026-10-48-02.png') !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            width: 100vw; height: 100vh; overflow: hidden;
            color: white; font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
        }

        #game-wrapper { display: flex; width: 100%; height: 100%; position: relative; transition: filter 0.8s; }
        #white-out { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 50000; transition: opacity 1s; }

        /* --- HUD & LORE --- */
        #hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 5000; pointer-events: none; width: 100%; }
        #energy-display { font-family: 'Courier New', monospace; font-variant-numeric: tabular-nums; font-size: 4.5rem; font-weight: bold; color: var(--energy-color); text-shadow: 0 0 15px #22d3ee; margin: 0; }
        #cps-display { font-size: 1.3rem; color: var(--accent); opacity: 0.9; text-transform: uppercase; letter-spacing: 2px; }
        #lore-scroll { position: absolute; top: 20px; left: 20px; width: 340px; background: var(--scroll-bg); border: 2px solid var(--accent); border-radius: 15px; padding: 15px; z-index: 8000; backdrop-filter: blur(10px); }
        #lore-title { font-size: 0.8rem; text-transform: uppercase; color: var(--accent); font-weight: bold; border-bottom: 1px solid rgba(216,180,254,0.3); padding-bottom: 4px; margin-bottom: 5px; }
        #lore-text { font-size: 0.85rem; line-height: 1.4; color: #f3f4f6; font-style: italic; }

        /* --- PRESTIGE MODULE (TOP RIGHT) --- */
        #altar-panel { position: absolute; top: 20px; right: 400px; z-index: 7000; display: flex; flex-direction: column; align-items: center; }
        #btn-prestige {
            background-image: url("https://i.ibb.co/35Vpc7b2/Dise-o-sin-t-tulo-1.png") !important;
            background-size: contain !important; background-repeat: no-repeat !important; background-position: center !important;
            width: 180px; height: 260px; border: none !important; background-color: transparent !important;
            transition: all 0.4s ease; cursor: not-allowed; opacity: 0.4;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        #btn-prestige.unlocked { opacity: 1.0; cursor: pointer; filter: drop-shadow(0 0 20px var(--gold-color)); animation: breathe 2s infinite alternate; }
        .prestige-label { width: 210px; padding: 8px; border-radius: 10px; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-weight: bold; font-size: 0.65rem; text-align: center; text-transform: uppercase; transform: translateX(-15px); pointer-events: none; }
        #prestige-stat-text { font-size: 0.8rem; font-weight: bold; background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 20px; margin-top: 10px; text-shadow: 0 0 8px #fff; }

        /* --- STAGE (LOCKED COORDINATES) --- */
        #main-stage { flex-grow: 1; position: relative; cursor: pointer; overflow: hidden; }
        #sticky-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; }
        #asset-chef { position: absolute; z-index: 1; transform: translate(-50%, -50%); left: 0px; top: -40px; width: 720px; pointer-events: none; }
        #asset-soup { position: absolute; z-index: 2; transform: translate(-50%, -50%); left: 70px; top: 250px; width: 1250px; pointer-events: none; transition: transform 0.1s; }
        #spoon-rig { position: absolute; z-index: 3; left: -95px; top: 5px; width: 840px; transform: translate(-50%, -50%) rotate(-27deg); transform-origin: 85% 15%; pointer-events: none; }
        #asset-spoon { width: 100%; transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: inherit; }

        /* --- SIDEBAR & SHOP --- */
        #companion-column { position: absolute; left: 20px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 4000; }
        .companion-slot { position: relative; width: 95px; height: 95px; background: rgba(255,255,255,0.05); border: 1px solid rgba(216, 180, 254, 0.2); border-radius: 20px; display: flex; justify-content: center; align-items: center; }
        .slot-img { width: 85%; height: 85%; object-fit: contain; animation: bob 3s ease-in-out infinite; }
        .lv-badge { position: absolute; bottom: -5px; right: -5px; background: #2e1065; border: 2px solid var(--gold-color); border-radius: 6px; padding: 1px 5px; font-size: 0.65rem; font-weight: bold; color: var(--gold-color); }
        
        #side-shop { width: 380px; background: var(--ui-bg); border-left: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(25px); padding: 20px; z-index: 6000; overflow-y: auto; }
        #prix-btn-sidebar { padding: 15px; background: linear-gradient(135deg, #7e22ce, #3b82f6); border-radius: 12px; font-weight: bold; text-align: center; cursor: not-allowed; border: 2px solid #fff; margin-bottom: 20px; text-transform: uppercase; opacity: 0.4; transition: 0.3s; }
        #prix-btn-sidebar.unlocked { opacity: 1; cursor: pointer; box-shadow: 0 0 15px #3b82f6; }
        .companion-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-bottom: 12px; cursor: not-allowed; border: 2px solid transparent; display: flex; align-items: center; opacity: 0.4; transition: 0.3s; }
        .companion-card.affordable { opacity: 1; cursor: pointer; border-color: var(--accent); background: rgba(168, 85, 247, 0.1); box-shadow: 0 0 10px var(--accent); }
        .comp-img { width: 60px; height: 60px; border-radius: 8px; margin-right: 12px; object-fit: cover; }
        .champ-banner { color: var(--gold-color); font-weight: bold; font-size: 0.7rem; display: block; margin-top: 3px; text-shadow: 0 0 5px #000; }

        /* --- GRAND PRIX MODAL --- */
        #race-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1e1b4b 0%, #000 100%); z-index: 100000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #race-track { width: 800px; height: 65vh; background: rgba(255,255,255,0.05); border: 4px solid var(--accent); display: flex; position: relative; border-radius: 20px; overflow: hidden; }
        .lane { flex: 1; height: 100%; border-right: 2px dashed rgba(255,255,255,0.2); position: relative; }
        .racer-img { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; object-fit: contain; transition: bottom 0.1s linear; }
        #btn-close-race { background: #ef4444; color: #fff; padding: 15px 45px; border-radius: 50px; font-weight: bold; border: 2px solid #fff; cursor: pointer; margin-top: 30px; }

        /* --- ANIMATIONS & SHOWCASES --- */
        .manual-stir { transform: rotate(15deg) !important; }
        .soup-ripple-active { transform: translate(-50%, -50%) scale(1.04, 0.96) !important; }
        .summon-clone { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0); z-index: 25000; pointer-events: none; transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); filter: drop-shadow(0 0 40px #fff); }
        .summon-active { transform: translate(-50%, -50%) scale(2.5) rotate(360deg); }
        #angel-showcase { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 26000; pointer-events: none; transition: 1.2s; max-width: 80vw; max-height: 70vh; object-fit: contain; }
        #angel-showcase.active { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 60px var(--gold-color)) brightness(1.5); }
        @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes breathe { from { transform: scale(1); } to { transform: scale(1.05); } }
        .shake { animation: shakeBtn 0.3s; }
        @keyframes shakeBtn { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        canvas#particle-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>
    <div id="white-out"></div>
    <img id="angel-showcase" src="https://i.ibb.co/35Vpc7b2/Dise-o-sin-t-tulo-1.png">

    <div id="race-modal">
        <h1 style="color:var(--gold-color); letter-spacing:4px; margin-bottom:10px;">ESQUELOTIA GRAND PRIX</h1>
        <div id="prix-sel-ui" style="text-align:center;"><p>Pick your racer!</p><div id="prix-list" style="display:flex; gap:20px; justify-content:center; margin-top:15px;"></div></div>
        <div id="prix-run-ui" style="display:none; flex-direction:column; align-items:center; width:100%;">
            <div id="race-track" onmousedown="prix.playerClick()">
                <div style="position:absolute; top:30px; width:100%; height:15px; background:repeating-linear-gradient(90deg,#fff,#000 20px);"></div>
                <div class="lane" id="lane-0"></div><div class="lane" id="lane-1"></div><div class="lane" id="lane-2"></div><div class="lane" id="lane-3"></div>
            </div>
            <div id="prix-timer" style="font-size:8rem; color:var(--gold-color); position:absolute; top:50%; text-shadow:0 0 20px #000"></div>
        </div>
        <div id="prix-end-ui" style="display:none; text-align:center;">
            <h2 id="prix-rank" style="font-size:3rem; color:#fff;"></h2><p id="prix-reward-msg" style="color:var(--gold-color); font-size:1.3rem;"></p>
            <button id="btn-close-race" onclick="prix.close()">RETURN TO CAULDRON</button>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="lore-scroll"><div id="lore-title">CHRONICLE</div><div id="lore-text">Connecting...</div></div>
        <div id="companion-column"></div>
        <div id="hud"><div id="energy-display">0</div><div id="cps-display">0.0 EB/s</div></div>
        <div id="altar-panel">
            <div id="btn-prestige" onclick="game.handlePrestigeClick()"><div class="prestige-label" id="prestige-text">LOCKED</div></div>
            <div id="prestige-stat-text">Angel Awakening Lv. 0 (+0% Global Boost)</div>
        </div>
        <section id="main-stage" onmousedown="game.click(event)">
            <canvas id="particle-canvas"></canvas>
            <div id="sticky-center">
                <img id="asset-chef" src="https://i.ibb.co/KjSyjHsj/chef-png.png">
                <img id="asset-soup" src="https://i.ibb.co/s9CgLx2n/soup-png.png">
                <div id="spoon-rig"><img id="asset-spoon" src="https://i.ibb.co/RTwhRpz3/spoon-png.png"></div>
            </div>
        </section>
        <aside id="side-shop">
            <h1 style="text-align:center; font-size:1.4rem;">PLUSHIE SHOP</h1>
            <div id="prix-btn-sidebar" onclick="prix.open()">Enter Grand Prix</div>
            <div id="companion-list"></div>
        </aside>
    </div>

    <audio id="audio-stir" src="wood_stir_asmr.mp3" preload="auto"></audio>

    <script>
        const game = {
            energy: 0, lifetime: 0, shards: 0, cps: 0, 
            paused: false, clicking: false, phase: 0, maxCh: 1, 
            cooldown: 0,

            companions: [
                { id:0, name:'Coco Mystic Octopus', cost:15, pow:1, count:0, isChampion:false, img:'https://i.ibb.co/qMhJR7Hz/Coco-the-Mystic-Octopus.png' },
                { id:1, name:'Baby Bunny Forest Guide', cost:100, pow:2, count:0, isChampion:false, img:'https://i.ibb.co/1fbZZGT2/Baby-Bunny-the-Forest-Guide.png' },
                { id:2, name:'Pio Pio Healing Chick', cost:1100, pow:0.15, count:0, isChampion:false, img:'https://i.ibb.co/7sLrntn/Pio-Pio-the-Healing-Chick.png' },
                { id:3, name:'Ivan Guardian Bear', cost:12000, pow:50, count:0, isChampion:false, img:'https://i.ibb.co/LDZxCSvh/Ivan-the-Guardian-Bear.png' }
            ],

            lore: ["SmallCreek skullchef has arrived from Esquelotia to heal Earth.", "The entity was stealing love from Esquelotia. Light was fading.", "Small Angel gave his physical life to heal his home planet.", "Skullchef embarked on this journey. His soup has Angel's soul.", "The soup is ready. Awaken the Soul to cleanse the atmosphere.", "Success. Small Angel's energy is woven into Earth's nature."],

            init() {
                this.ctx = document.getElementById('particle-canvas').getContext('2d');
                this.resize(); window.onresize = () => this.resize();
                this.load(); this.render();
                setInterval(()=>!this.paused && this.logic(), 1000);
                setInterval(()=>!this.paused && this.ui(), 100);
                setInterval(()=>this.save(), 5000);
                this.loop();
            },
            resize() { this.ctx.canvas.width = window.innerWidth; this.ctx.canvas.height = window.innerHeight; },
            save() { localStorage.setItem('soup_save_vfinal', JSON.stringify({e:this.energy, l:this.lifetime, s:this.shards, c:this.companions.map(x=>({ct:x.count, ch:x.isChampion})), cd:this.cooldown})); },
            load() { 
                const s = JSON.parse(localStorage.getItem('soup_save_vfinal'));
                if(s){ this.energy=s.e; this.lifetime=s.l; this.shards=s.s; this.cooldown=s.cd; s.c.forEach((x,i)=>{if(this.companions[i]){this.companions[i].count=x.ct; this.companions[i].isChampion=x.ch;}}); }
                const col = document.getElementById('companion-column'); col.innerHTML = '';
                this.companions.forEach(c => { if(c.count>0) this.createSlot(c); });
            },
            logic() {
                let base = (this.companions[0].count * 1 * (this.companions[0].isChampion?2:1)) + (this.companions[3].count * 50 * (this.companions[3].isChampion?2:1));
                let m = (1 + (this.companions[2].count * 0.15 * (this.companions[2].isChampion?2:1))) * (1 + this.shards * 0.5);
                this.cps = base * m; this.energy += this.cps; this.lifetime += this.cps;
                if(this.cooldown > 0) this.cooldown--;
            },
            ui() {
                document.getElementById('energy-display').innerText = Math.floor(this.energy).toLocaleString();
                document.getElementById('cps-display').innerText = `${this.cps.toFixed(1)} EB PER SECOND`;
                let goal = 25e6 * Math.pow(5, this.shards);
                let pBtn = document.getElementById('btn-prestige');
                if (this.energy >= goal) { pBtn.className = 'unlocked'; document.getElementById('prestige-text').innerText = "[ AWAKEN SOUL ]"; }
                else { pBtn.className = 'locked'; document.getElementById('prestige-text').innerText = `Requires ${goal.toLocaleString()} EB`; }
                document.getElementById('prestige-stat-text').style.display = this.shards > 0 ? 'block' : 'none';
                document.getElementById('prestige-stat-text').innerText = `Angel Awakening Lv. ${this.shards} (+${this.shards*50}% Global Boost)`;
                this.updateLore();
                const pSide = document.getElementById('prix-btn-sidebar');
                if(this.companions[0].count > 0 && this.cooldown <= 0) { pSide.className='unlocked'; pSide.innerText="Enter Grand Prix"; }
                else { pSide.className=''; pSide.innerText = this.cooldown > 0 ? `CD: ${Math.floor(this.cooldown/60)}:${(this.cooldown%60).toString().padStart(2,'0')}` : "LOCKED (Coco Lv1)"; }
                document.querySelectorAll('.companion-card').forEach((c, i) => c.className = `companion-card ${this.energy >= this.companions[i].cost ? 'affordable' : ''}`);
            },
            updateLore() {
                if(this.shards>0) this.maxCh = 6;
                else [0, 1e3, 5e4, 5e5, 1e6].forEach((t, i) => { if(this.lifetime >= t) this.maxCh = i+1; });
                document.getElementById('lore-text').innerText = this.lore[this.maxCh-1];
                document.getElementById('lore-title').innerText = `Chronicle ${this.maxCh}`;
                this.chMult = [1, 2, 3, 4, 5, 6][this.maxCh-1];
            },
            click(e) {
                if(this.paused || e.target.closest('#side-shop') || e.target.closest('#altar-panel')) return;
                this.clicking = true;
                const clickPower = (this.chMult * Math.pow(2, this.companions[1].count * (this.companions[1].isChampion?2:1))) * (1 + this.shards * 0.5);
                this.energy += clickPower; this.lifetime += clickPower;
                const s = document.getElementById('audio-stir').cloneNode(); s.volume = 0.3; s.play().catch(()=>{});
                document.getElementById('asset-spoon').classList.add('manual-stir'); document.getElementById('asset-soup').classList.add('soup-ripple-active');
                setTimeout(() => { document.getElementById('asset-spoon').classList.remove('manual-stir'); document.getElementById('asset-soup').classList.remove('soup-ripple-active'); this.clicking = false; }, 120);
                this.part(window.innerWidth/2, window.innerHeight/2+100, 'energy');
            },
            triggerSummon(c) {
                const h = document.createElement('img'); h.src = c.img; h.className = 'summon-clone'; h.style.width="300px"; document.body.appendChild(h);
                this.part(window.innerWidth/2, window.innerHeight/2, 'magic');
                setTimeout(() => h.classList.add('summon-active'), 20);
                setTimeout(() => {
                    let sid = `slot-${c.id}`, slot = document.getElementById(sid);
                    if(!slot) { slot = this.createSlot(c); }
                    let r = slot.getBoundingClientRect(); h.style.left = r.left+45+'px'; h.style.top = r.top+45+'px'; h.style.transform = 'translate(-50%,-50%) scale(0.35) rotate(0deg)';
                    setTimeout(() => { h.remove(); slot.querySelector('.lv-badge').innerText = `Lv. ${c.count}`; }, 1100);
                }, 1500);
            },
            createSlot(c) {
                const slot = document.createElement('div'); slot.id = `slot-${c.id}`; slot.className = 'companion-slot';
                slot.innerHTML = `<img src="${c.img}" class="slot-img"><div class="lv-badge">Lv. ${c.count}</div>`;
                document.getElementById('companion-column').appendChild(slot);
                return slot;
            },
            buyCompanion(i) {
                const c = this.companions[i];
                if (this.energy >= c.cost) { this.energy -= c.cost; c.count++; c.cost = Math.floor(c.cost * 1.35); this.triggerSummon(c); this.render(); }
            },
            handlePrestigeClick() {
                let goal = 25e6 * Math.pow(5, this.shards);
                if (this.energy < goal) { document.getElementById('btn-prestige').classList.add('shake'); setTimeout(()=>document.getElementById('btn-prestige').classList.remove('shake'), 300); return; }
                this.paused = true; document.getElementById('angel-showcase').classList.add('active');
                for(let i=0; i<15; i++) setTimeout(()=>this.part(window.innerWidth/2, window.innerHeight/2, 'magic'), i*100);
                setTimeout(() => {
                    document.getElementById('white-out').style.opacity = '1';
                    setTimeout(() => {
                        this.shards++; this.energy = 0; this.lifetime = 0;
                        this.companions.forEach(c => { c.count = 0; c.isChampion = false; c.cost = c.id === 0 ? 15 : (c.id === 1 ? 100 : (c.id === 2 ? 1100 : 12000)); });
                        document.getElementById('companion-column').innerHTML = '';
                        this.render(); document.getElementById('white-out').style.opacity = '0'; this.paused = false;
                        document.getElementById('angel-showcase').classList.remove('active');
                    }, 1500);
                }, 2000);
            },
            loop() {
                const sp = document.getElementById('spoon-rig'), so = document.getElementById('asset-soup');
                if(!this.paused && this.cps > 0 && !this.clicking) {
                    this.phase += (0.04 + Math.log10(this.cps+1)*0.05);
                    sp.style.transform = `translate(-50%,-50%) rotate(${-27+Math.sin(this.phase)*5}deg)`;
                    so.style.transform = `translate(-50%,-50%) scaleY(${1+Math.sin(this.phase)*0.012})`;
                }
                this.drawPart(); requestAnimationFrame(()=>this.loop());
            },
            render() {
                const list = document.getElementById('companion-list'); list.innerHTML = '';
                this.companions.forEach((c, i) => {
                    const card = document.createElement('div'); card.className = `companion-card ${this.energy >= c.cost ? 'affordable' : ''}`;
                    card.onclick = () => this.buyCompanion(i);
                    let power = (c.id === 0 ? 1 : (c.id === 1 ? 2 : (c.id === 2 ? 15 : 50))) * (1 + this.shards * 0.5);
                    let desc = c.id === 2 ? `+${power.toFixed(1)}% Production` : `+${power.toFixed(1)} EB/s`;
                    let angel = this.shards > 0 ? `<br><span style="color:#22c55e; font-size:0.6rem;">(+${this.shards*50}% Angel Power!)</span>` : '';
                    let champ = c.isChampion ? `<span class="champ-banner">👑 CHAMPION MODE (x2!)</span>` : '';
                    card.innerHTML = `<img src="${c.img}" class="comp-img"><div style="flex:1"><b>${c.name} (${c.count})</b><div style="font-size:0.7rem;color:#cbd5e1">${desc}${angel}</div>${champ}<span style="color:#fbbf24;font-weight:bold;display:block;">${Math.floor(c.cost).toLocaleString()} EB</span></div>`;
                    list.appendChild(card);
                });
            },
            particles: [],
            part(x, y, type) { for(let i=0; i<(type==='magic'?25:8); i++) this.particles.push({ x, y, type, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10-(type==='energy'?5:0), life:1, size:Math.random()*8+4, color:type==='magic'?(Math.random()>0.5?'#fff':'#fbbf24'):'#a5f3fc' }); },
            drawPart() {
                this.ctx.clearRect(0,0,this.ctx.canvas.width,this.ctx.canvas.height);
                const tx = window.innerWidth/2, ty = 60;
                this.particles.forEach((p, i) => {
                    if(p.type==='energy') { p.vx+=(window.innerWidth/2-p.x)*0.003; p.vy+=(60-p.y)*0.003; }
                    p.x+=p.vx; p.y+=p.vy; p.life-=0.015; this.ctx.fillStyle=p.color; this.ctx.globalAlpha=p.life;
                    this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill();
                    if(p.life<=0) this.particles.splice(i,1);
                });
                this.ctx.globalAlpha=1;
            }
        };

        const prix = {
            active: false, racers: [], tick: null, cd: 3, champ: null,
            open() {
                if(game.cooldown > 0 || game.companions[0].count === 0) return;
                game.paused = true; document.getElementById('race-modal').style.display='flex';
                document.getElementById('prix-sel-ui').style.display='block'; document.getElementById('prix-run-ui').style.display='none'; document.getElementById('prix-end-ui').style.display='none';
                const l = document.getElementById('prix-list'); l.innerHTML = '';
                game.companions.filter(c => c.count > 0).forEach(c => {
                    const d = document.createElement('div'); d.className='prix-select-card';
                    d.innerHTML = `<img src="${c.img}" style="width:80px;"><p>${c.name}</p>`;
                    d.onclick = () => this.startRace(c); l.appendChild(d);
                });
            },
            startRace(c) {
                this.champ = c; document.getElementById('prix-sel-ui').style.display='none'; document.getElementById('prix-run-ui').style.display='flex';
                for(let i=0; i<4; i++) document.getElementById(`lane-${i}`).innerHTML = '';
                this.racers = [{id:c.id, pos:0, img:c.img, isP:true, lane:0}, ...game.companions.filter(co=>co.id!==c.id).map((co,i)=>({id:co.id, pos:0, img:co.img, isP:false, lane:i+1}))];
                this.racers.forEach(r => { const im = document.createElement('img'); im.id=`r-${r.lane}`; im.src=r.img; im.className='racer-img'; document.getElementById(`lane-${r.lane}`).appendChild(im); });
                this.cd = 3; const box = document.getElementById('prix-timer');
                const itv = setInterval(() => { box.innerText = this.cd > 0 ? this.cd : "GO!"; if(this.cd < 0) { clearInterval(itv); box.innerText = ""; this.begin(); } this.cd--; }, 1000);
            },
            begin() { this.active = true; this.tick = setInterval(() => { this.racers.slice(1).forEach(r => r.pos += Math.random()*3.5); this.upd(); this.check(); }, 100); },
            playerClick() { if(this.active) { this.racers[0].pos += 8; this.upd(); } },
            upd() { this.racers.forEach(r => { const el = document.getElementById(`r-${r.lane}`); if(el) el.style.bottom = (10+(r.pos/100)*75)+'%'; }); },
            check() { const w = this.racers.find(r => r.pos >= 100); if(w) { this.active = false; clearInterval(this.tick); this.end(w.isP); } },
            end(won) {
                document.getElementById('prix-run-ui').style.display='none'; document.getElementById('prix-end-ui').style.display='block';
                const r = document.getElementById('prix-rank'), m = document.getElementById('prix-reward-msg');
                if(won) { r.innerText="1ST PLACE!"; m.innerText=`VICTORY! Your ${this.champ.name} is now a Champion. Production DOUBLED!`; this.champ.isChampion = true; }
                else { let goal = 25e6 * Math.pow(5, game.shards); let con = Math.floor(goal*0.01); r.innerText="DEFEAT!"; m.innerText=`Award: +${con.toLocaleString()} Energy Balls!`; game.energy += con; game.lifetime += con; }
                game.render(); game.cooldown = 600;
            },
            close() { this.active = false; if(this.tick) clearInterval(this.tick); document.getElementById('race-modal').style.display='none'; game.paused = false; }
        };
        window.onload = () => game.init();
    </script>
</body>
</html>
