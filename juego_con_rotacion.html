<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmallCreek: The Wooden Soup - Precision Calibration</title>
    <style id="dynamic-styles">
        :root {
            --cosmic-bg: radial-gradient(circle at center, #1a0b2e 0%, #05020a 100%);
            --energy-color: #a5f3fc;
            --energy-glow: 0 0 15px #22d3ee;
            --accent: #d8b4fe;
            --ui-bg: rgba(15, 23, 42, 0.94);
        }

        * { 
            box-sizing: border-box; 
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0; padding: 0;
            background: var(--cosmic-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        #game-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* --- HUD --- */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 5000;
            pointer-events: none;
            width: 100%;
        }

        #energy-display {
            font-family: 'Courier New', monospace;
            font-size: 4rem;
            font-weight: bold;
            color: var(--energy-color);
            text-shadow: var(--energy-glow);
            margin: 0;
        }

        /* --- CENTER WRAPPER --- */
        #main-stage {
            flex-grow: 1;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        #sticky-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 10px; height: 10px;
        }

        /* --- LAYERS (Corrected Order) --- */

        /* LAYER 1: BACK - CHEF */
        #asset-chef {
            position: absolute;
            z-index: 1;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: transform 0.1s ease;
        }

        /* LAYER 2: MIDDLE - SOUP (CAULDRON) */
        #asset-soup {
            position: absolute;
            z-index: 2;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }

        /* LAYER 3: FRONT - SPOON (Always on top) */
        #spoon-rig {
            position: absolute;
            z-index: 3;
            pointer-events: none;
            /* Pivot point fixed at handle grip area */
            transform-origin: 85% 15%; 
        }

        #asset-spoon {
            width: 100%;
            display: block;
            /* Stirring animation happens on the image, rig handles position/base rotation */
            transition: transform 0.12s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: inherit;
        }

        /* --- ANIMATION STATES --- */
        .stir-swing { transform: rotate(30deg) !important; }
        .chef-effort { margin-top: 4px; }
        .soup-wave { transform: translate(-50%, -50%) scale(1.03, 0.96) !important; }

        /* --- SIDE SHOP --- */
        #side-shop {
            width: 360px;
            background: var(--ui-bg);
            border-left: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 25px;
            z-index: 4000;
            overflow-y: auto;
        }

        .companion-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .affordable { border-color: var(--accent); background: rgba(168, 85, 247, 0.15); }
        .locked { opacity: 0.3; filter: grayscale(1); }

        /* --- CALIBRATION DEV PANEL --- */
        #dev-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 330px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #ff4444;
            padding: 15px;
            z-index: 9999;
            font-family: monospace;
            font-size: 11px;
            color: #fff;
            max-height: 90vh;
            overflow-y: auto;
        }
        .dev-group { border-bottom: 1px solid #444; margin-bottom: 10px; padding-bottom: 5px; }
        .dev-title { color: #ff4444; font-weight: bold; margin-bottom: 5px; }
        .dev-row { display: flex; justify-content: space-between; align-items: center; margin: 3px 0; }
        .dev-btn { background: #333; color: white; border: 1px solid #666; padding: 2px 8px; cursor: pointer; min-width: 30px; }
        .dev-btn:hover { background: #555; }
        #live-css-out { 
            background: #111; color: #0f0; padding: 10px; font-size: 10px; 
            white-space: pre-wrap; margin-top: 10px; border: 1px solid #0f0;
        }

        /* --- OTHER UI --- */
        #frenzy-btn {
            position: absolute;
            bottom: 30px; left: 30px;
            padding: 15px 30px; background: #ef4444; color: white;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            display: none; animation: pulse 1s infinite; z-index: 4500;
        }
        @keyframes pulse { 0% {transform:scale(1);} 50% {transform:scale(1.1);} 100% {transform:scale(1);} }

        #story-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.94); display: none;
            justify-content: center; align-items: center; z-index: 10000;
        }
        #story-box { background: #1e1b4b; padding: 50px; border-radius: 30px; border: 3px solid var(--accent); text-align: center; max-width: 500px; }

        canvas#particle-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <section id="main-stage" onmousedown="game.handleManualClick(event)">
            <div id="hud">
                <div id="energy-display">0</div>
                <div id="cps-display">ENERGY PER SECOND: 0</div>
            </div>

            <canvas id="particle-canvas"></canvas>

            <div id="sticky-center">
                <!-- Correct Layer Order for Depth -->
                <img id="asset-chef" src="https://i.ibb.co/KjSyjHsj/chef-png.png">
                <img id="asset-soup" src="https://i.ibb.co/s9CgLx2n/soup-png.png">
                <div id="spoon-rig">
                    <img id="asset-spoon" src="https://i.ibb.co/RTwhRpz3/spoon-png.png">
                </div>
            </div>

            <div id="frenzy-btn" onclick="game.activateFrenzy(event)">ASMR FRENZY!</div>
        </section>

        <aside id="side-shop">
            <h2 style="text-align:center; color:var(--accent); letter-spacing:2px;">SHOP</h2>
            <div id="companion-list"></div>
        </aside>
    </div>

    <!-- CALIBRATION PANEL -->
    <div id="dev-panel">
        <div class="dev-title">MASTER CALIBRATION TOOL</div>

        <!-- Chef Controls -->
        <div class="dev-group">
            <div class="dev-title" style="color:cyan">A. Chef (Back Layer)</div>
            <div class="dev-row">Position X/Y: 
                <div>
                    <button class="dev-btn" onclick="dev.move('chef','x',-5)">←</button>
                    <button class="dev-btn" onclick="dev.move('chef','x',5)">→</button>
                    <button class="dev-btn" onclick="dev.move('chef','y',-5)">↑</button>
                    <button class="dev-btn" onclick="dev.move('chef','y',5)">↓</button>
                </div>
            </div>
            <div class="dev-row">Scale: <div><button class="dev-btn" onclick="dev.scale('chef',-0.05)">-</button><button class="dev-btn" onclick="dev.scale('chef',0.05)">+</button></div></div>
        </div>

        <!-- Soup Controls -->
        <div class="dev-group">
            <div class="dev-title" style="color:lime">B. Soup (Middle Layer)</div>
            <div class="dev-row">Position X/Y: 
                <div>
                    <button class="dev-btn" onclick="dev.move('soup','x',-5)">←</button>
                    <button class="dev-btn" onclick="dev.move('soup','x',5)">→</button>
                    <button class="dev-btn" onclick="dev.move('soup','y',-5)">↑</button>
                    <button class="dev-btn" onclick="dev.move('soup','y',5)">↓</button>
                </div>
            </div>
            <div class="dev-row">Scale: <div><button class="dev-btn" onclick="dev.scale('soup',-0.1)">-</button><button class="dev-btn" onclick="dev.scale('soup',0.1)">+</button></div></div>
        </div>

        <!-- Spoon Controls -->
        <div class="dev-group">
            <div class="dev-title" style="color:yellow">C. Spoon (Front Layer)</div>
            <div class="dev-row">Position X/Y: 
                <div>
                    <button class="dev-btn" onclick="dev.move('spoon','x',-5)">←</button>
                    <button class="dev-btn" onclick="dev.move('spoon','x',5)">→</button>
                    <button class="dev-btn" onclick="dev.move('spoon','y',-5)">↑</button>
                    <button class="dev-btn" onclick="dev.move('spoon','y',5)">↓</button>
                </div>
            </div>
            <div class="dev-row">Rotation: 
                <div>
                    <button class="dev-btn" onclick="dev.rotate('spoon',-5)">↺ 5°</button>
                    <button class="dev-btn" onclick="dev.rotate('spoon',-1)">↺ 1°</button>
                    <button class="dev-btn" onclick="dev.rotate('spoon',1)">↻ 1°</button>
                    <button class="dev-btn" onclick="dev.rotate('spoon',5)">↻ 5°</button>
                </div>
            </div>
            <div class="dev-row">Scale: <div><button class="dev-btn" onclick="dev.scale('spoon',-0.05)">-</button><button class="dev-btn" onclick="dev.scale('spoon',0.05)">+</button></div></div>
        </div>

        <div class="dev-title" style="color:#fff">LIVE CSS EXPORT</div>
        <div id="live-css-out"></div>
    </div>

    <div id="story-overlay">
        <div id="story-box">
            <p id="story-text"></p>
            <button class="btn-continue" onclick="game.closeStory()">Continue Mission</button>
        </div>
    </div>

    <audio id="audio-stir" src="wood_stir_asmr.mp3" preload="auto"></audio>

    <script>
        // --- CALIBRATION ENGINE ---
        const dev = {
            state: {
                chef: { x: 0, y: -40, s: 1.0, r: 0 },
                soup: { x: 0, y: 250, s: 2.2, r: 0 },
                spoon: { x: 30, y: -50, s: 1.2, r: -15 }
            },
            move(target, axis, val) {
                this.state[target][axis] += val;
                this.apply();
            },
            scale(target, val) {
                this.state[target].s += val;
                this.apply();
            },
            rotate(target, val) {
                this.state[target].r += val;
                this.apply();
            },
            apply() {
                const chef = document.getElementById('asset-chef');
                const spoon = document.getElementById('spoon-rig');
                const soup = document.getElementById('asset-soup');

                chef.style.left = this.state.chef.x + 'px';
                chef.style.top = this.state.chef.y + 'px';
                chef.style.width = (600 * this.state.chef.s) + 'px';

                soup.style.left = this.state.soup.x + 'px';
                soup.style.top = this.state.soup.y + 'px';
                soup.style.width = (500 * this.state.soup.s) + 'px';

                spoon.style.left = this.state.spoon.x + 'px';
                spoon.style.top = this.state.spoon.y + 'px';
                spoon.style.width = (400 * this.state.spoon.s) + 'px';
                spoon.style.transform = `translate(-50%, -50%) rotate(${this.state.spoon.r}deg)`;

                this.exportCSS();
            },
            exportCSS() {
                const out = `#asset-chef { left: ${this.state.chef.x}px; top: ${this.state.chef.y}px; width: ${Math.round(600*this.state.chef.s)}px; }\n` +
                            `#asset-soup { left: ${this.state.soup.x}px; top: ${this.state.soup.y}px; width: ${Math.round(500*this.state.soup.s)}px; }\n` +
                            `#spoon-rig { left: ${this.state.spoon.x}px; top: ${this.state.spoon.y}px; width: ${Math.round(400*this.state.spoon.s)}px; transform: rotate(${this.state.spoon.r}deg); }`;
                document.getElementById('live-css-out').innerText = out;
            }
        };

        // --- GAME ENGINE ---
        const game = {
            energy: 0, clickValue: 1, baseCPS: 0, globalMultiplier: 1, isFrenzy: false, frenzyCooldown: false, paused: false,
            
            companions: [
                { id: 0, name: 'Coco the Octopus', cost: 15, power: 1, type: 'cps', count: 0, desc: 'Auto-stirs (+1 EPS).' },
                { id: 1, name: 'Baby Bunny', cost: 100, power: 2, type: 'click', count: 0, desc: 'Click value x2.' },
                { id: 2, name: 'The Giraffe', cost: 1100, power: 0.15, type: 'boost', count: 0, desc: 'Production +15%.' },
                { id: 3, name: 'Ivan the Bear', cost: 12000, power: 50, type: 'cps', count: 0, desc: 'Expert stirring +50 EPS.' }
            ],

            milestones: [
                { threshold: 0, text: "Welcome to Earth, Skullchef. Use the sacred Wooden Soup recipe to release the loving energy of Small Angel. Tap to stir.", triggered: false },
                { threshold: 1000, text: "Coco the Octopus has arrived from Esquelotia! Love is spreading.", triggered: false },
                { threshold: 50000, text: "Baby Bunny wakes up! Your compassion doubles click power.", triggered: false },
                { threshold: 1000000, text: "Global Enlightenment Achieved! The Wooden Soup has healed the world.", triggered: false }
            ],

            init() {
                this.canvas = document.getElementById('particle-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.onresize = () => this.resize();
                dev.apply();
                this.renderShop();
                this.updateUI();
                setInterval(() => { if(!this.paused) this.applyPassive(); }, 1000);
                this.particleLoop();
                this.checkMilestones();
            },

            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },

            handleManualClick(e) {
                if(this.paused || e.target.closest('#side-shop') || e.target.closest('#dev-panel')) return;
                
                const val = this.clickValue * (this.isFrenzy ? 10 : 1);
                this.energy += val;

                // Animate
                const spoon = document.getElementById('asset-spoon');
                const chef = document.getElementById('asset-chef');
                const soup = document.getElementById('asset-soup');

                spoon.classList.add('stir-swing');
                chef.classList.add('chef-effort');
                soup.classList.add('soup-wave');

                setTimeout(() => {
                    spoon.classList.remove('stir-swing');
                    chef.classList.remove('chef-effort');
                    soup.classList.remove('soup-wave');
                }, 120);

                // Sound
                const audio = document.getElementById('audio-stir');
                audio.currentTime = 0; audio.play().catch(()=>{});

                // Particles (Spawn inside the pot)
                const soupRect = soup.getBoundingClientRect();
                this.createParticles(soupRect.left + soupRect.width/2, soupRect.top + 80);
                
                this.updateUI();
                this.checkMilestones();
            },

            applyPassive() {
                let cps = this.companions.filter(c => c.type === 'cps').reduce((a, b) => a + (b.power * b.count), 0);
                cps *= this.globalMultiplier;
                this.energy += cps;
                this.baseCPS = cps;
                this.updateUI();
                this.checkMilestones();
            },

            buyCompanion(i) {
                const c = this.companions[i];
                if (this.energy >= c.cost) {
                    this.energy -= c.cost;
                    c.count++;
                    c.cost = Math.floor(c.cost * 1.22);
                    this.clickValue = 1 * Math.pow(2, this.companions[1].count);
                    this.globalMultiplier = 1 + (this.companions[2].count * 0.15);
                    if(this.companions[3].count > 0 && !this.frenzyCooldown) document.getElementById('frenzy-btn').style.display = 'block';
                    this.renderShop();
                    this.updateUI();
                }
            },

            activateFrenzy(e) {
                e.stopPropagation();
                if (this.frenzyCooldown) return;
                this.isFrenzy = true; this.frenzyCooldown = true;
                document.getElementById('frenzy-btn').style.display = 'none';
                setTimeout(() => {
                    this.isFrenzy = false;
                    setTimeout(() => {
                        this.frenzyCooldown = false;
                        if(this.companions[3].count > 0) document.getElementById('frenzy-btn').style.display = 'block';
                    }, 120000);
                }, 10000);
            },

            checkMilestones() {
                for (let m of this.milestones) {
                    if (!m.triggered && this.energy >= m.threshold) {
                        m.triggered = true;
                        this.showStory(m.text);
                        break;
                    }
                }
            },

            showStory(text) {
                this.paused = true;
                document.getElementById('story-text').innerText = text;
                document.getElementById('story-overlay').style.display = 'flex';
            },

            closeStory() {
                this.paused = false;
                document.getElementById('story-overlay').style.display = 'none';
            },

            updateUI() {
                document.getElementById('energy-display').innerText = Math.floor(this.energy).toLocaleString();
                document.getElementById('cps-display').innerText = `EPS: ${this.baseCPS.toFixed(1)}`;
                const cards = document.querySelectorAll('.companion-card');
                this.companions.forEach((c, i) => {
                    if (cards[i]) cards[i].className = `companion-card ${this.energy >= c.cost ? 'affordable' : 'locked'}`;
                });
            },

            renderShop() {
                const list = document.getElementById('companion-list');
                list.innerHTML = '';
                this.companions.forEach((c, i) => {
                    const card = document.createElement('div');
                    card.onclick = () => this.buyCompanion(i);
                    card.innerHTML = `<b>${c.name} (${c.count})</b><div class="comp-stats">${c.desc}</div><span class="comp-cost">${Math.floor(c.cost).toLocaleString()} EB</span>`;
                    list.appendChild(card);
                });
            },

            particles: [],
            createParticles(x, y) {
                for(let i=0; i<8; i++) {
                    this.particles.push({ x, y, vx: (Math.random()-0.5)*8, vy: -Math.random()*8-2, life: 1, size: Math.random()*8+6 });
                }
            },

            particleLoop() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const tx = window.innerWidth / 2, ty = 80;
                this.particles.forEach((p, i) => {
                    p.vx += (tx - p.x) * 0.003; p.vy += (ty - p.y) * 0.003;
                    p.x += p.vx; p.y += p.vy; p.life -= 0.015;
                    this.ctx.fillStyle = `rgba(165, 243, 252, ${p.life})`;
                    this.ctx.shadowBlur = 10; this.ctx.shadowColor = "#22d3ee";
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); this.ctx.fill();
                    if(p.life <= 0) this.particles.splice(i, 1);
                });
                requestAnimationFrame(() => this.particleLoop());
            }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
