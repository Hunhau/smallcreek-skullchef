<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmallCreek: The Wooden Soup - Awakening Pro</title>
    <style>
        :root {
            --energy-color: #a5f3fc;
            --energy-glow: 0 0 15px #22d3ee;
            --gold-color: #fbbf24;
            --gold-glow: 0 0 20px #f59e0b;
            --accent: #d8b4fe;
            --ui-bg: rgba(15, 23, 42, 0.94);
        }

        /* --- UI RESET & BACKGROUND --- */
        * { 
            box-sizing: border-box; 
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0; padding: 0;
            background-image: url('https://i.ibb.co/ZzwMRrb0/Chat-GPT-Image-16-jun-2026-10-48-02.png');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            width: 100vw; height: 100vh; overflow: hidden;
            color: white; font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
        }

        #game-wrapper { display: flex; width: 100%; height: 100%; position: relative; transition: filter 2s ease; }
        
        /* Celestial Aura for Ascended State */
        #game-wrapper.ascended {
            backdrop-filter: hue-rotate(20deg) brightness(1.1) saturate(1.3);
        }

        /* --- HUD --- */
        #hud {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 5000; pointer-events: none; width: 100%;
        }
        #energy-display { font-family: 'Courier New', monospace; font-variant-numeric: tabular-nums; font-size: 4.5rem; font-weight: bold; color: var(--energy-color); text-shadow: var(--energy-glow); margin: 0; }
        .ascended #energy-display { color: var(--gold-color); text-shadow: var(--gold-glow); }
        #cps-display { font-size: 1.3rem; color: var(--accent); opacity: 0.9; letter-spacing: 2px; text-transform: uppercase; }
        
        #shard-display { 
            font-size: 1.5rem; color: var(--gold-color); font-weight: bold; 
            display: none; margin-top: 5px; text-shadow: 0 0 10px #000;
        }

        /* --- LOCKED STAGE LAYOUT --- */
        #main-stage { flex-grow: 1; position: relative; cursor: pointer; overflow: hidden; }
        #sticky-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; }

        #asset-chef { position: absolute; z-index: 1; transform: translate(-50%, -50%); pointer-events: none; left: 0px; top: -40px; width: 720px; }
        #asset-soup { position: absolute; z-index: 2; transform: translate(-50%, -50%); pointer-events: none; left: 70px; top: 250px; width: 1250px; transition: transform 0.1s ease-out; }
        #spoon-rig { position: absolute; z-index: 3; pointer-events: none; left: -95px; top: 5px; width: 840px; transform: translate(-50%, -50%) rotate(-27deg); transform-origin: 85% 15%; }
        #asset-spoon { width: 100%; display: block; transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: inherit; }

        /* --- UNIQUE SLOTS --- */
        #companion-column-left { position: absolute; left: 30px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 25px; z-index: 4000; pointer-events: none; }
        .companion-slot { position: relative; width: 110px; height: 110px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(216, 180, 254, 0.2); border-radius: 20px; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .slot-img { width: 90%; height: 90%; object-fit: contain; animation: bobbing 3s ease-in-out infinite; }
        .level-badge { position: absolute; bottom: -10px; right: -10px; background: linear-gradient(135deg, #7e22ce, #2e1065); border: 2px solid var(--gold-color); border-radius: 10px; padding: 2px 8px; font-size: 0.8rem; font-weight: bold; color: var(--gold-color); z-index: 10; }
        @keyframes bobbing { 0%, 100% { transform: translateY(0px) rotate(-1deg); } 50% { transform: translateY(-10px) rotate(1deg); } }

        /* --- SUMMON SHOWCASE --- */
        .summon-clone { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0); z-index: 9000; pointer-events: none; transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .summon-showcase { transform: translate(-50%, -50%) scale(2.5) rotate(360deg); }

        /* --- SHOP MENU --- */
        #side-shop { width: 380px; background: var(--ui-bg); border-left: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(25px); display: flex; flex-direction: column; padding: 25px; z-index: 6000; overflow-y: auto; }
        .shop-header { font-size: 1.8rem; text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; color: var(--accent); text-transform: uppercase; }
        .companion-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; cursor: not-allowed; border: 2px solid transparent; display: flex; align-items: center; opacity: 0.5; transition: all 0.3s ease; }
        .companion-card.affordable { opacity: 1; cursor: pointer; border-color: var(--accent); background: rgba(168, 85, 247, 0.2); box-shadow: 0 0 15px var(--accent); }
        .comp-img { width: 70px; height: 70px; border-radius: 10px; margin-right: 15px; object-fit: cover; }

        /* --- OVERLAYS --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 10000; padding: 40px; }
        #story-overlay { background: rgba(0,0,0,0.94); }
        #prestige-overlay { background: #fff; z-index: 11000; transition: opacity 2s ease; }
        .box { background: #1e1b4b; padding: 60px; border-radius: 30px; border: 3px solid var(--accent); text-align: center; max-width: 650px; box-shadow: 0 0 60px rgba(168, 85, 247, 0.4); }
        .awake-btn { background: var(--gold-color); color: #000; margin-top: 20px; font-weight: bold; border: none; padding: 20px 40px; border-radius: 50px; cursor: pointer; font-size: 1.5rem; animation: pulse 1s infinite; }
        
        /* --- ANIMATION HELPERS --- */
        .manual-stir { transform: rotate(15deg) !important; } 
        .soup-ripple { transform: translate(-50%, -50%) scale(1.03, 0.95) !important; }
        @keyframes pulse { 0%, 100% {transform:scale(1);} 50% {transform:scale(1.05);} }

        canvas#particle-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="companion-column-left"></div>

        <section id="main-stage" onmousedown="game.handleManualClick(event)">
            <div id="hud">
                <div id="energy-display">0</div>
                <div id="cps-display">ENERGY PER SECOND: 0</div>
                <div id="shard-display">✨ ANGEL SHARDS: 0</div>
            </div>

            <canvas id="particle-canvas"></canvas>

            <div id="sticky-center">
                <img id="asset-chef" src="https://i.ibb.co/KjSyjHsj/chef-png.png">
                <img id="asset-soup" src="https://i.ibb.co/s9CgLx2n/soup-png.png">
                <div id="spoon-rig">
                    <img id="asset-spoon" src="https://i.ibb.co/RTwhRpz3/spoon-png.png">
                </div>
            </div>
        </section>

        <aside id="side-shop">
            <h1 class="shop-header">Esquelotia Shop</h1>
            <div id="companion-list"></div>
        </aside>
    </div>

    <!-- PRESTIGE AWAKENING OVERLAY -->
    <div id="prestige-overlay" class="overlay">
        <div class="box" style="background: #000; border-color: var(--gold-color);">
            <h1 style="color: var(--gold-color); font-size: 3rem;">AWAKENING</h1>
            <p id="prestige-msg" style="font-size: 1.5rem; line-height: 1.8;">Small Angel's energy is overflowing! Sacred shards are forming...</p>
            <button class="awake-btn" onclick="game.confirmAwakening()">CLAIM ANGEL SHARDS</button>
        </div>
    </div>

    <!-- STORY MODAL -->
    <div id="story-overlay" class="overlay">
        <div class="box">
            <p id="story-text" style="font-size: 1.4rem; line-height: 1.7;"></p>
            <button style="background:var(--accent); color:#1a0b2e; border:none; padding:15px 45px; border-radius:60px; font-weight:bold; cursor:pointer; font-size:1.2rem;" onclick="game.closeStory()">Continue Mission</button>
        </div>
    </div>

    <audio id="audio-stir" src="wood_stir_asmr.mp3" preload="auto"></audio>

    <script>
        // --- CELESTIAL HERITAGE FRAMEWORK (Hidden Hooks) ---
        const celestialUpgrades = [];

        const game = {
            // High-Precision Math Engine
            energy: 0.0,
            lifetimeEnergy: 0.0,
            angelShards: 0.0,
            clickValue: 1.0,
            baseCPS: 0.0,
            globalMultiplier: 1.0,
            isAscended: false,
            
            paused: false,
            passivePhase: 0,
            isClicking: false,

            companions: [
                { id: 0, name: 'Coco the Mystic Octopus', cost: 15, power: 1, type: 'cps', count: 0, img: 'https://i.ibb.co/qMhJR7Hz/Coco-the-Mystic-Octopus.png', desc: 'Automates stirring (+1 EPS).' },
                { id: 1, name: 'Baby Bunny the Forest Guide', cost: 100, power: 2, type: 'click', count: 0, img: 'https://i.ibb.co/1fbZZGT2/Baby-Bunny-the-Forest-Guide.png', desc: 'Doubles click power per level.' },
                { id: 2, name: 'Pio Pio the Healing Chick', cost: 1100, power: 0.15, type: 'boost', count: 0, img: 'https://i.ibb.co/7sLrntn/Pio-Pio-the-Healing-Chick.png', desc: '+15% Global Production.' },
                { id: 3, name: 'Ivan the Guardian Bear', cost: 12000, power: 50, type: 'cps', count: 0, img: 'https://i.ibb.co/LDZxCSvh/Ivan-the-Guardian-Bear.png', desc: '+50 EPS & Ancient Strength.' }
            ],

            milestones: [
                { threshold: 0, text: "Welcome to Earth, Skullchef. Use the sacred Wooden Soup recipe to release the loving energy of Small Angel. Tap to stir.", triggered: false },
                { threshold: 1000, text: "Coco the Octopus has arrived! Love is spreading.", triggered: false },
                { threshold: 50000, text: "Baby Bunny wakes up! Your stirring power doubles.", triggered: false },
                { threshold: 1000000, text: "1,000,000 Energy reached! The Awakening is now possible. Check the shop for the ritual.", triggered: false }
            ],

            init() {
                this.canvas = document.getElementById('particle-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.onresize = () => this.resize();
                
                this.renderShop();
                this.updateUI();

                // Engine Loops
                setInterval(() => { if(!this.paused) this.applyPassiveIncome(); }, 1000);
                setInterval(() => { if(!this.paused) this.updateShopButtons(); }, 100);
                this.animationLoop();
                this.checkMilestones();
            },

            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },

            animationLoop() {
                if (!this.paused && this.baseCPS > 0 && !this.isClicking) {
                    const speed = 0.03 + (this.baseCPS * 0.0004);
                    this.passivePhase += speed;
                    const spoon = document.getElementById('spoon-rig');
                    const soup = document.getElementById('asset-soup');
                    const sway = Math.sin(this.passivePhase) * 5;
                    spoon.style.transform = `translate(-50%, -50%) rotate(${-27 + sway}deg)`;
                    soup.style.transform = `translate(-50%, -50%) scaleY(${1 + (Math.sin(this.passivePhase) * 0.015)})`;
                }
                this.particleLoop();
                requestAnimationFrame(() => this.animationLoop());
            },

            handleManualClick(e) {
                if(this.paused || e.target.closest('#side-shop')) return;
                this.isClicking = true;
                
                const val = this.clickValue * this.globalMultiplier;
                this.energy += val;
                this.lifetimeEnergy += val;

                const sound = document.getElementById('audio-stir');
                const clickSound = sound.cloneNode(); clickSound.volume = 0.5; clickSound.play().catch(()=>{});

                const spoon = document.getElementById('asset-spoon');
                const soup = document.getElementById('asset-soup');
                spoon.classList.add('manual-stir'); soup.classList.add('soup-ripple');

                setTimeout(() => {
                    spoon.classList.remove('manual-stir'); soup.classList.remove('soup-ripple');
                    this.isClicking = false;
                }, 120);

                this.createParticles(window.innerWidth / 2, window.innerHeight / 2 + 150, 'energy');
                this.updateUI();
                this.checkMilestones();
            },

            // --- PRESTIGE: THE AWAKENING ---
            checkMilestones() {
                // Regular Story
                for (let m of this.milestones) {
                    if (!m.triggered && this.energy >= m.threshold) {
                        m.triggered = true; this.showStory(m.text); break;
                    }
                }
                // Prestige Check (1M threshold)
                if (this.energy >= 1000000 && !document.getElementById('prestige-btn')) {
                    this.injectPrestigeButton();
                }
            },

            injectPrestigeButton() {
                const btn = document.createElement('div');
                btn.id = 'prestige-btn';
                btn.style = "margin: 20px 0; padding: 15px; background: var(--gold-color); color:#000; border-radius:15px; font-weight:bold; cursor:pointer; text-align:center;";
                btn.innerText = "✨ ASCEND TO PLANET ESQUELOTIA";
                btn.onclick = () => this.triggerPrestige();
                document.getElementById('companion-list').prepend(btn);
            },

            triggerPrestige() {
                this.paused = true;
                const shardsToGain = Math.floor(Math.sqrt(this.lifetimeEnergy / 1000000));
                document.getElementById('prestige-msg').innerText = `By sacrificing your Wooden Soup, you will materialize ${shardsToGain} Angel Shards. This will reset Earth's progress but increase your divine power forever.`;
                document.getElementById('prestige-overlay').style.display = 'flex';
            },

            confirmAwakening() {
                const shardsToGain = Math.floor(Math.sqrt(this.lifetimeEnergy / 1000000));
                this.angelShards += shardsToGain;
                this.isAscended = true;

                // Reset World
                this.energy = 0;
                this.baseCPS = 0;
                this.companions.forEach(c => { c.count = 0; c.cost = c.id === 0 ? 15 : (c.id === 1 ? 100 : (c.id === 2 ? 1100 : 12000)); });
                
                // Clear Companion Sidebar
                document.getElementById('companion-column-left').innerHTML = '';
                
                // Apply Ascended Multiplier (Shards give 10% boost each)
                this.globalMultiplier = 1 + (this.angelShards * 0.1);
                
                // UI Visual Ascension
                document.getElementById('game-wrapper').classList.add('ascended');
                document.getElementById('shard-display').style.display = 'block';
                document.getElementById('shard-display').innerText = `✨ ANGEL SHARDS: ${this.angelShards}`;
                
                // Fade In effect
                const overlay = document.getElementById('prestige-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    overlay.style.opacity = '1';
                    this.paused = false;
                    this.recalculateStats();
                    this.renderShop();
                    this.updateUI();
                }, 2000);
            },

            // --- REFACTORED SUMMONING ENGINE ---
            triggerFusionSummon(comp) {
                const hero = document.createElement('img');
                hero.src = comp.img;
                hero.className = 'summon-clone';
                document.body.appendChild(hero);
                this.createParticles(window.innerWidth/2, window.innerHeight/2, 'magic');

                setTimeout(() => hero.classList.add('summon-showcase'), 10);

                setTimeout(() => {
                    const slotId = `slot-${comp.id}`;
                    let slot = document.getElementById(slotId);
                    
                    if (!slot) {
                        slot = document.createElement('div');
                        slot.id = slotId;
                        slot.className = 'companion-slot';
                        slot.innerHTML = `<img src="${comp.img}" class="slot-img"><div class="level-badge">Lv. 0</div>`;
                        document.getElementById('companion-column-left').appendChild(slot);
                    }

                    const targetRect = slot.getBoundingClientRect();
                    hero.style.left = targetRect.left + (targetRect.width/2) + 'px';
                    hero.style.top = targetRect.top + (targetRect.height/2) + 'px';
                    hero.style.transform = 'translate(-50%, -50%) scale(0.4) rotate(0deg)';
                    
                    setTimeout(() => {
                        hero.remove();
                        slot.classList.add('fusion-pulse');
                        slot.querySelector('.level-badge').innerText = `Lv. ${comp.count}`;
                        this.createParticles(targetRect.left + 50, targetRect.top + 50, 'magic');
                        setTimeout(() => slot.classList.remove('fusion-pulse'), 500);
                    }, 1000);
                }, 1500);
            },

            applyPassiveIncome() {
                let totalCPS = this.companions.filter(c => c.type === 'cps').reduce((acc, c) => acc + (c.power * c.count), 0);
                // Celestial Heritage math hook
                const boost = 1 + (this.angelShards * 0.1); 
                totalCPS *= (this.globalMultiplier * boost);
                
                this.energy += totalCPS;
                this.lifetimeEnergy += totalCPS;
                this.baseCPS = totalCPS;
                this.updateUI();
                this.checkMilestones();
            },

            updateShopButtons() {
                const cards = document.querySelectorAll('.companion-card');
                this.companions.forEach((c, i) => {
                    if (cards[i]) {
                        if (this.energy >= c.cost) cards[i].classList.add('affordable');
                        else cards[i].classList.remove('affordable');
                    }
                });
            },

            buyCompanion(index) {
                const c = this.companions[index];
                if (this.energy >= c.cost) {
                    this.energy -= c.cost;
                    c.count++;
                    c.cost = Math.floor(c.cost * 1.25);
                    this.triggerFusionSummon(c);
                    this.recalculateStats();
                    this.renderShop();
                    this.updateUI();
                }
            },

            recalculateStats() {
                this.clickValue = 1 * Math.pow(2, this.companions[1].count);
                const pioBoost = 1 + (this.companions[2].count * 0.15);
                this.globalMultiplier = pioBoost;
            },

            showStory(text) { this.paused = true; document.getElementById('story-text').innerText = text; document.getElementById('story-overlay').style.display = 'flex'; },
            closeStory() { this.paused = false; document.getElementById('story-overlay').style.display = 'none'; },

            updateUI() {
                document.getElementById('energy-display').innerText = Math.floor(this.energy).toLocaleString();
                document.getElementById('cps-display').innerText = `EB PER SECOND: ${this.baseCPS.toFixed(1)}`;
            },

            renderShop() {
                const container = document.getElementById('companion-list');
                container.innerHTML = '';
                this.companions.forEach((c, index) => {
                    const card = document.createElement('div');
                    card.className = `companion-card ${this.energy >= c.cost ? 'affordable' : ''}`;
                    card.onclick = () => this.buyCompanion(index);
                    card.innerHTML = `<img src="${c.img}" class="comp-img"><div class="comp-info"><b>${c.name} (${c.count})</b><div class="comp-stats">${c.desc}</div><span class="comp-cost">${Math.floor(c.cost).toLocaleString()} EB</span></div>`;
                    container.appendChild(card);
                });
                if (this.energy >= 1000000) this.injectPrestigeButton();
            },

            // --- ENHANCED CELESTIAL PARTICLE ENGINE ---
            particles: [],
            createParticles(x, y, type) {
                const count = type === 'magic' ? 30 : 8;
                for(let i=0; i<count; i++) {
                    this.particles.push({
                        x, y, type,
                        vx: (Math.random() - 0.5) * (type === 'magic' ? 12 : 6),
                        vy: (Math.random() - 0.5) * (type === 'magic' ? 12 : 6) - (type === 'energy' ? 4 : 0),
                        life: 1, size: Math.random() * 8 + 4,
                        // Golden particles if Ascended
                        color: this.isAscended && type === 'energy' ? '#fbbf24' : (type === 'magic' ? '#fff' : '#a5f3fc')
                    });
                }
            },

            particleLoop() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const targetX = window.innerWidth / 2, targetY = 60;
                this.particles.forEach((p, i) => {
                    if(p.type === 'energy') { p.vx += (targetX - p.x) * 0.003; p.vy += (targetY - p.y) * 0.003; }
                    p.x += p.vx; p.y += p.vy; p.life -= 0.015;
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.life;
                    // Enhanced glow trail
                    this.ctx.shadowBlur = this.isAscended ? 20 : 10;
                    this.ctx.shadowColor = p.color;
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); this.ctx.fill();
                    if(p.life <= 0) this.particles.splice(i, 1);
                });
                this.ctx.globalAlpha = 1;
            }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
