<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmallCreek: The Wooden Soup - Living World Edition</title>
    <style>
        :root {
            --energy-color: #a5f3fc;
            --energy-glow: 0 0 15px #22d3ee;
            --accent: #d8b4fe;
            --ui-bg: rgba(15, 23, 42, 0.94);
            --affordable-glow: 0 0 20px rgba(216, 180, 254, 0.6);
        }

        /* --- UI RESET & BACKGROUND --- */
        * { 
            box-sizing: border-box; 
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0; padding: 0;
            background-image: url('https://i.ibb.co/ZzwMRrb0/Chat-GPT-Image-16-jun-2026-10-48-02.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
        }

        #game-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* --- HUD --- */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 5000;
            pointer-events: none;
            width: 100%;
        }

        #energy-display {
            font-family: 'Courier New', monospace;
            font-variant-numeric: tabular-nums;
            font-size: 4.5rem;
            font-weight: bold;
            color: var(--energy-color);
            text-shadow: var(--energy-glow);
            margin: 0;
        }

        #cps-display {
            font-size: 1.3rem;
            color: var(--accent);
            opacity: 0.9;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- LOCKED STAGE LAYOUT --- */
        #main-stage {
            flex-grow: 1;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        #sticky-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 10px; height: 10px;
        }

        /* LAYER 1: BACK - CHEF */
        #asset-chef {
            position: absolute;
            z-index: 1;
            transform: translate(-50%, -50%);
            pointer-events: none;
            left: 0px; top: -40px; width: 720px;
            transition: margin-top 0.1s;
        }

        /* LAYER 2: MIDDLE - SOUP */
        #asset-soup {
            position: absolute;
            z-index: 2;
            transform: translate(-50%, -50%);
            pointer-events: none;
            left: 70px; top: 250px; width: 1250px;
            /* Transition used only for manual click ripple */
            transition: transform 0.1s ease-out;
        }

        /* LAYER 3: FRONT - SPOON */
        #spoon-rig {
            position: absolute;
            z-index: 3;
            pointer-events: none;
            left: -95px; top: 5px; width: 840px; 
            /* Initial rotation -27deg handled by JS Loop */
            transform: translate(-50%, -50%) rotate(-27deg);
            transform-origin: 85% 15%; 
        }

        #asset-spoon {
            width: 100%;
            display: block;
            /* Transition triggered for manual click punch */
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: inherit;
        }

        /* --- MANUAL OVERRIDE ANIMATIONS --- */
        .manual-stir { transform: rotate(15deg) !important; } 
        .chef-effort { margin-top: 4px; }
        .soup-ripple { transform: translate(-50%, -50%) scale(1.03, 0.95) !important; }

        /* --- SHOP MENU --- */
        #side-shop {
            width: 380px;
            background: var(--ui-bg);
            border-left: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
            padding: 25px;
            z-index: 6000;
            overflow-y: auto;
        }

        .shop-header {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .companion-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: not-allowed;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            opacity: 0.5;
            transition: all 0.3s ease;
            filter: grayscale(0.8);
        }

        .companion-card.affordable { 
            opacity: 1; filter: grayscale(0); cursor: pointer;
            border-color: var(--accent);
            background: rgba(168, 85, 247, 0.2);
            box-shadow: var(--affordable-glow);
            transform: scale(1.02);
        }

        .comp-img { width: 70px; height: 70px; border-radius: 10px; margin-right: 15px; object-fit: cover; background: #000; }
        .comp-info b { display: block; font-size: 1.1rem; color: #fff; line-height: 1.2; }
        .comp-stats { font-size: 0.85rem; color: #cbd5e1; margin-top: 3px; }
        .comp-cost { color: #fbbf24; font-weight: bold; margin-top: 5px; display: block; font-size: 1.1rem; }

        /* --- SKILL & STORY UI --- */
        #frenzy-btn {
            position: absolute;
            bottom: 40px; left: 40px;
            padding: 20px 40px; background: #ef4444; color: white;
            border-radius: 60px; font-weight: bold; cursor: pointer;
            display: none; animation: pulse 1s infinite; z-index: 4500;
            box-shadow: 0 0 30px #ef4444; text-transform: uppercase;
        }
        @keyframes pulse { 0% {transform:scale(1);} 50% {transform:scale(1.1);} 100% {transform:scale(1);} }

        #story-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); display: none;
            justify-content: center; align-items: center; z-index: 10000;
            padding: 40px;
        }
        #story-box { background: #1e1b4b; padding: 60px; border-radius: 30px; border: 3px solid var(--accent); text-align: center; max-width: 600px; }
        #story-text { font-size: 1.4rem; line-height: 1.6; margin-bottom: 30px; color: #f3f4f6; }
        .btn-continue { background: var(--accent); color: #1a0b2e; border: none; padding: 15px 45px; border-radius: 60px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }

        canvas#particle-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <section id="main-stage" onmousedown="game.handleManualClick(event)">
            <div id="hud">
                <div id="energy-display">0</div>
                <div id="cps-display">ENERGY BALLS PER SECOND: 0</div>
            </div>

            <canvas id="particle-canvas"></canvas>

            <div id="sticky-center">
                <img id="asset-chef" src="https://i.ibb.co/KjSyjHsj/chef-png.png">
                <img id="asset-soup" src="https://i.ibb.co/s9CgLx2n/soup-png.png">
                <div id="spoon-rig">
                    <img id="asset-spoon" src="https://i.ibb.co/RTwhRpz3/spoon-png.png">
                </div>
            </div>

            <div id="frenzy-btn" onclick="game.activateFrenzy(event)">ASMR FRENZY! (TAP IVAN)</div>
        </section>

        <aside id="side-shop">
            <h1 class="shop-header">Esquelotia Shop</h1>
            <div id="companion-list"></div>
        </aside>
    </div>

    <div id="story-overlay">
        <div id="story-box">
            <p id="story-text"></p>
            <button class="btn-continue" onclick="game.closeStory()">Continue Mission</button>
        </div>
    </div>

    <audio id="audio-stir" src="wood_stir_asmr.mp3" preload="auto"></audio>

    <script>
        const game = {
            energy: 0, clickValue: 1, baseCPS: 0, globalMultiplier: 1, 
            isFrenzy: false, frenzyCooldown: false, paused: false,
            
            // For Passive Animation Logic
            passivePhase: 0,
            isClicking: false,

            companions: [
                { id: 0, name: 'Coco the Mystic Octopus', cost: 15, power: 1, type: 'cps', count: 0, img: 'https://i.ibb.co/qMhJR7Hz/Coco-the-Mystic-Octopus.png', desc: 'Automates stirring (+1 EPS).' },
                { id: 1, name: 'Baby Bunny the Forest Guide', cost: 100, power: 2, type: 'click', count: 0, img: 'https://i.ibb.co/1fbZZGT2/Baby-Bunny-the-Forest-Guide.png', desc: 'Each click gives x2 Energy.' },
                { id: 2, name: 'Pio Pio the Healing Chick', cost: 1100, power: 0.15, type: 'boost', count: 0, img: 'https://i.ibb.co/7sLrntn/Pio-Pio-the-Healing-Chick.png', desc: '+15% Global Passive Boost.' },
                { id: 3, name: 'Ivan the Guardian Bear', cost: 12000, power: 50, type: 'cps', count: 0, img: 'https://i.ibb.co/LDZxCSvh/Ivan-the-Guardian-Bear.png', desc: '+50 EPS & Unlocks Frenzy Skill.' }
            ],

            milestones: [
                { threshold: 0, text: "Welcome to Earth, Skullchef. Use the sacred Wooden Soup recipe to release the loving energy of Small Angel. The planet needs peace and healing. Tap to stir.", triggered: false },
                { threshold: 1000, text: "The dark energy on Earth is resisting, but Coco the Octopus has arrived from Esquelotia to help you stir. Love is spreading!", triggered: false },
                { threshold: 50000, text: "Baby Bunny wakes up! Infused with the compassionate energy of Small Angel, your stirring power doubles.", triggered: false },
                { threshold: 1000000, text: "Global Enlightenment Achieved! Human hearts are healed.", triggered: false }
            ],

            init() {
                this.canvas = document.getElementById('particle-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.onresize = () => this.resize();
                
                this.renderShop();
                this.updateUI();

                // Start Core Logic Loops
                setInterval(() => { if(!this.paused) this.applyPassiveIncome(); }, 1000);
                setInterval(() => { if(!this.paused) this.updateShopButtons(); }, 100);
                
                // Animation Tick (60 FPS)
                this.animationTick();
                
                this.particleLoop();
                this.checkMilestones();
            },

            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },

            // --- THE LIVING WORLD ANIMATION TICK ---
            animationTick() {
                if (!this.paused && this.baseCPS > 0 && !this.isClicking) {
                    // Speed scales with total EPS
                    const speed = 0.03 + (this.baseCPS * 0.0005);
                    this.passivePhase += speed;

                    const spoon = document.getElementById('spoon-rig');
                    const soup = document.getElementById('asset-soup');

                    // Gentle sway: Base -27deg +/- 5deg
                    const sway = Math.sin(this.passivePhase) * 5;
                    spoon.style.transform = `translate(-50%, -50%) rotate(${-27 + sway}deg)`;

                    // Subtle liquid breathing
                    const ripple = 1 + (Math.sin(this.passivePhase) * 0.015);
                    soup.style.transform = `translate(-50%, -50%) scaleX(${1 + (Math.abs(sway)*0.005)}) scaleY(${ripple})`;
                }
                requestAnimationFrame(() => this.animationTick());
            },

            handleManualClick(e) {
                if(this.paused || e.target.closest('#side-shop')) return;

                this.isClicking = true;
                const val = this.clickValue * (this.isFrenzy ? 10 : 1);
                this.energy += val;

                // Sound
                const sound = document.getElementById('audio-stir');
                const clickSound = sound.cloneNode();
                clickSound.volume = 0.5; clickSound.play().catch(()=>{});

                // Asset Override
                const spoon = document.getElementById('asset-spoon');
                const chef = document.getElementById('asset-chef');
                const soup = document.getElementById('asset-soup');

                spoon.classList.add('manual-stir');
                chef.classList.add('chef-effort');
                soup.classList.add('soup-ripple');

                setTimeout(() => {
                    spoon.classList.remove('manual-stir');
                    chef.classList.remove('chef-effort');
                    soup.classList.remove('soup-ripple');
                    this.isClicking = false; // Resume passive flow
                }, 120);

                this.createParticles(window.innerWidth / 2, window.innerHeight / 2 + 150);
                this.updateUI();
                this.checkMilestones();
            },

            applyPassiveIncome() {
                let totalCPS = this.companions.filter(c => c.type === 'cps').reduce((acc, c) => acc + (c.power * c.count), 0);
                totalCPS *= this.globalMultiplier;
                this.energy += totalCPS;
                this.baseCPS = totalCPS;
                this.updateUI();
                this.checkMilestones();
            },

            updateShopButtons() {
                const cards = document.querySelectorAll('.companion-card');
                this.companions.forEach((c, i) => {
                    if (cards[i]) {
                        if (this.energy >= c.cost) cards[i].classList.add('affordable');
                        else cards[i].classList.remove('affordable');
                    }
                });
            },

            buyCompanion(index) {
                const c = this.companions[index];
                if (this.energy >= c.cost) {
                    this.energy -= c.cost;
                    c.count++;
                    c.cost = Math.floor(c.cost * 1.25);
                    this.recalculateStats();
                    this.renderShop();
                    this.updateUI();
                }
            },

            recalculateStats() {
                this.clickValue = 1 * Math.pow(2, this.companions[1].count);
                this.globalMultiplier = 1 + (this.companions[2].count * 0.15);
                if (this.companions[3].count > 0 && !this.frenzyCooldown) {
                    document.getElementById('frenzy-btn').style.display = 'block';
                }
            },

            activateFrenzy(e) {
                e.stopPropagation();
                if (this.frenzyCooldown) return;
                this.isFrenzy = true; this.frenzyCooldown = true;
                document.getElementById('frenzy-btn').style.display = 'none';
                setTimeout(() => {
                    this.isFrenzy = false;
                    setTimeout(() => {
                        this.frenzyCooldown = false;
                        if(this.companions[3].count > 0) document.getElementById('frenzy-btn').style.display = 'block';
                    }, 120000);
                }, 10000);
            },

            checkMilestones() {
                for (let m of this.milestones) {
                    if (!m.triggered && this.energy >= m.threshold) {
                        m.triggered = true;
                        this.showStory(m.text);
                        break;
                    }
                }
            },

            showStory(text) {
                this.paused = true;
                document.getElementById('story-text').innerText = text;
                document.getElementById('story-overlay').style.display = 'flex';
            },

            closeStory() {
                this.paused = false;
                document.getElementById('story-overlay').style.display = 'none';
            },

            updateUI() {
                document.getElementById('energy-display').innerText = Math.floor(this.energy).toLocaleString();
                document.getElementById('cps-display').innerText = `EB PER SECOND: ${this.baseCPS.toFixed(1)}`;
            },

            renderShop() {
                const container = document.getElementById('companion-list');
                container.innerHTML = '';
                this.companions.forEach((c, index) => {
                    const card = document.createElement('div');
                    card.className = `companion-card ${this.energy >= c.cost ? 'affordable' : ''}`;
                    card.onclick = () => this.buyCompanion(index);
                    card.innerHTML = `
                        <img src="${c.img}" class="comp-img">
                        <div class="comp-info">
                            <b>${c.name} (${c.count})</b>
                            <div class="comp-stats">${c.desc}</div>
                            <span class="comp-cost">${Math.floor(c.cost).toLocaleString()} EB</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            },

            particles: [],
            createParticles(x, y) {
                for(let i=0; i<8; i++) {
                    this.particles.push({
                        x: x + (Math.random() - 0.5) * 120,
                        y: y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: -Math.random() * 8 - 4,
                        life: 1,
                        size: Math.random() * 8 + 6
                    });
                }
            },

            particleLoop() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const targetX = window.innerWidth / 2, targetY = 60;
                this.particles.forEach((p, i) => {
                    p.vx += (targetX - p.x) * 0.003;
                    p.vy += (targetY - p.y) * 0.003;
                    p.x += p.vx; p.y += p.vy; p.life -= 0.015;
                    this.ctx.fillStyle = `rgba(165, 243, 252, ${p.life})`;
                    this.ctx.shadowBlur = 15; this.ctx.shadowColor = "#22d3ee";
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); this.ctx.fill();
                    if(p.life <= 0) this.particles.splice(i, 1);
                });
                requestAnimationFrame(() => this.particleLoop());
            }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
