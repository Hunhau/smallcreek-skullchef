<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmallCreek: The Wooden Soup - Grand Prix Final</title>
    <style>
        :root {
            --energy-color: #a5f3fc;
            --energy-glow: 0 0 15px #22d3ee;
            --gold-color: #fbbf24;
            --gold-glow: 0 0 25px #f59e0b;
            --accent: #d8b4fe;
            --ui-bg: rgba(15, 23, 42, 0.94);
            --scroll-bg: rgba(30, 27, 75, 0.85);
        }

        /* --- UI RESET & BACKGROUND --- */
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-image: url('https://i.ibb.co/ZzwMRrb0/Chat-GPT-Image-16-jun-2026-10-48-02.png');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            width: 100vw; height: 100vh; overflow: hidden;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
        }

        #game-wrapper { display: flex; width: 100%; height: 100%; position: relative; transition: filter 0.8s; }
        #white-out { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 50000; transition: opacity 1s; }

        /* --- LORE SCROLL (TOP LEFT) --- */
        #lore-scroll {
            position: absolute; top: 20px; left: 20px; width: 350px;
            background: var(--scroll-bg); border: 2px solid var(--accent);
            border-radius: 15px; padding: 15px; z-index: 8000;
            backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #lore-title { font-size: 0.8rem; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid rgba(216, 180, 254, 0.3); padding-bottom: 4px; }
        #lore-text { font-size: 0.95rem; line-height: 1.4; color: #f3f4f6; font-style: italic; }

        /* --- HUD --- */
        #hud {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 5000; pointer-events: none; width: 100%;
        }
        #energy-display { font-family: 'Courier New', monospace; font-variant-numeric: tabular-nums; font-size: 4.5rem; font-weight: bold; color: var(--energy-color); text-shadow: var(--energy-glow); margin: 0; }
        #cps-display { font-size: 1.3rem; color: var(--accent); opacity: 0.9; letter-spacing: 1px; }

        /* --- PRESTIGE ALTAR (TOP RIGHT) --- */
        #altar-panel { position: absolute; top: 20px; right: 400px; z-index: 7000; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        #prestige-btn {
            width: 180px; height: 260px; position: relative;
            background-image: url('https://i.ibb.co/35Vpc7b2/Dise-o-sin-t-tulo-1.png');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            background-color: transparent; border: none; transition: all 0.5s ease; cursor: not-allowed;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        #prestige-btn.unlocked { opacity: 1; cursor: pointer; animation: breathe 2.5s infinite alternate; filter: drop-shadow(0 0 15px var(--gold-color)); }
        .prestige-label { width: 210px; padding: 10px; border-radius: 12px; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-weight: bold; font-size: 0.7rem; text-align: center; text-transform: uppercase; transform: translateX(-15px); pointer-events: none; }
        #angel-slot-permanent { width: 85px; height: 85px; background: rgba(255,255,255,0.05); border: 2px solid var(--gold-color); border-radius: 50%; display: none; justify-content: center; align-items: center; margin-top: 10px; }
        #prestige-stat-text { font-size: 0.8rem; font-weight: bold; color: #fff; text-shadow: 0 0 8px #fff; display: none; background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 20px; }

        /* --- LOCKED STAGE LAYOUT (STRICT) --- */
        #main-stage { flex-grow: 1; position: relative; cursor: pointer; overflow: hidden; }
        #sticky-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; }
        #asset-chef { position: absolute; z-index: 1; transform: translate(-50%, -50%); left: 0px; top: -40px; width: 720px; pointer-events: none; }
        #asset-soup { position: absolute; z-index: 2; transform: translate(-50%, -50%); left: 70px; top: 250px; width: 1250px; pointer-events: none; transition: transform 0.1s; }
        #spoon-rig { position: absolute; z-index: 3; left: -95px; top: 5px; width: 840px; transform: translate(-50%, -50%) rotate(-27deg); transform-origin: 85% 15%; pointer-events: none; }
        #asset-spoon { width: 100%; display: block; transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: inherit; }

        /* --- LEFT SIDEBAR SLOTS --- */
        #companion-column { position: absolute; left: 30px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 4000; pointer-events: none; }
        .companion-slot { position: relative; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(216, 180, 254, 0.2); border-radius: 20px; display: flex; justify-content: center; align-items: center; }
        .slot-img { width: 85%; height: 85%; object-fit: contain; animation: bob 3s ease-in-out infinite; }
        .lv-badge { position: absolute; bottom: -8px; right: -8px; background: #2e1065; border: 2px solid var(--gold-color); border-radius: 8px; padding: 2px 6px; font-size: 0.7rem; font-weight: bold; color: var(--gold-color); }

        /* --- SHOP MENU --- */
        #side-shop { width: 380px; background: var(--ui-bg); border-left: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(25px); display: flex; flex-direction: column; padding: 25px; z-index: 6000; overflow-y: auto; }
        .shop-header { font-size: 1.8rem; text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; color: var(--accent); text-transform: uppercase; }
        #prix-btn { padding: 15px; background: linear-gradient(135deg, #7e22ce, #3b82f6); border-radius: 15px; font-weight: bold; text-align: center; cursor: pointer; border: 2px solid #fff; margin-bottom: 20px; display: none; text-transform: uppercase; }
        .companion-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; cursor: not-allowed; border: 2px solid transparent; display: flex; align-items: center; opacity: 0.5; transition: all 0.3s; }
        .companion-card.affordable { opacity: 1; cursor: pointer; border-color: var(--accent); background: rgba(168, 85, 247, 0.15); box-shadow: 0 0 15px var(--accent); }
        .comp-img { width: 70px; height: 70px; border-radius: 10px; margin-right: 15px; object-fit: cover; }

        /* --- GRAND PRIX MODAL UI --- */
        #race-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1e1b4b 0%, #000 100%); z-index: 100000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #prix-close-btn { position: absolute; top: 30px; right: 30px; background: #ef4444; border: 2px solid #fff; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #race-track { width: 800px; height: 70vh; background: rgba(255,255,255,0.05); border: 4px solid var(--accent); display: flex; position: relative; border-radius: 20px; }
        .lane { flex: 1; height: 100%; border-right: 2px dashed rgba(255,255,255,0.2); position: relative; }
        .racer-img { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; object-fit: contain; transition: bottom 0.1s linear; }
        .finish-line { position: absolute; top: 30px; left: 0; width: 100%; height: 15px; background: repeating-linear-gradient(90deg, #fff, #000 20px); }
        .prix-select-card { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .prix-select-card:hover { transform: scale(1.1); border-color: var(--accent); background: rgba(255,255,255,0.2); }

        /* --- ANIMATIONS --- */
        .summon-clone { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0); z-index: 25000; pointer-events: none; transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); filter: drop-shadow(0 0 40px #fff); }
        .summon-active { transform: translate(-50%, -50%) scale(2.5) rotate(360deg); }
        #angel-showcase { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 26000; pointer-events: none; transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1); max-width: 80vw; max-height: 70vh; object-fit: contain; }
        #angel-showcase.active { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 60px var(--gold-color)) brightness(1.5); }
        .manual-stir { transform: rotate(15deg) !important; }
        .soup-ripple-active { transform: translate(-50%, -50%) scale(1.04, 0.96) !important; }
        @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes breathe { from { transform: scale(1); } to { transform: scale(1.08); } }
        .shake { animation: shakeBtn 0.3s ease-in-out; }
        @keyframes shakeBtn { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        canvas#particle-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="white-out"></div>
    <img id="angel-showcase" src="https://i.ibb.co/35Vpc7b2/Dise-o-sin-t-tulo-1.png">

    <!-- THE GRAND PRIX MODAL -->
    <div id="race-modal">
        <button id="prix-close-btn" onclick="prix.close()">RETURN TO CAULDRON</button>
        <h1 style="color:var(--gold-color); letter-spacing:4px; margin-bottom: 5px;">THE GRAND PRIX</h1>
        
        <div id="prix-selection-view" style="text-align:center;">
            <p style="font-size:1.5rem; margin-bottom:20px;">Choose your Champion to race!</p>
            <div id="prix-selector-list" style="display:flex; gap:20px; justify-content:center;"></div>
        </div>

        <div id="prix-race-view" style="display:none; flex-direction:column; align-items:center; width:100%;">
            <div id="race-track">
                <div class="finish-line"></div>
                <div class="lane" id="lane-0"></div>
                <div class="lane" id="lane-1"></div>
                <div class="lane" id="lane-2"></div>
                <div class="lane" id="lane-3"></div>
            </div>
            <div id="prix-countdown" style="font-size:8rem; font-weight:bold; color:var(--gold-color); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-shadow: 0 0 30px #000;"></div>
        </div>

        <div id="prix-result-view" style="display:none; text-align:center;">
            <h2 id="prix-rank" style="font-size:4rem; color:#fff;"></h2>
            <p id="prix-reward" style="color:var(--gold-color); font-size:1.5rem;"></p>
            <button class="prestige-label" style="cursor:pointer; padding:15px 40px; margin-top:30px; opacity:1;" onclick="prix.close()">BACK TO EARTH</button>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="lore-scroll">
            <div id="lore-title">Ancestral Scroll</div>
            <div id="lore-text">Connecting to Esquelotia...</div>
        </div>

        <div id="companion-column"></div>

        <div id="hud">
            <div id="energy-display">0</div>
            <div id="cps-display">EB PER SECOND: 0</div>
        </div>

        <div id="altar-panel">
            <div id="prestige-btn" onclick="game.handlePrestigeClick()">
                <div class="prestige-label" id="prestige-text">Requires 1,000,000 Energy</div>
            </div>
            <div id="angel-slot-permanent">
                <img src="https://i.ibb.co/35Vpc7b2/Dise-o-sin-t-tulo-1.png" class="slot-img" style="animation: bob 3s infinite;">
            </div>
            <div id="prestige-stat-text">Angel Awakening Lv. 0 (+0% Global Boost)</div>
        </div>

        <section id="main-stage" onmousedown="game.handleManualClick(event)">
            <canvas id="particle-canvas"></canvas>
            <div id="sticky-center">
                <img id="asset-chef" src="https://i.ibb.co/KjSyjHsj/chef-png.png">
                <img id="asset-soup" src="https://i.ibb.co/s9CgLx2n/soup-png.png">
                <div id="spoon-rig">
                    <img id="asset-spoon" src="https://i.ibb.co/RTwhRpz3/spoon-png.png">
                </div>
            </div>
        </section>

        <aside id="side-shop">
            <h1 class="shop-header">Shop</h1>
            <div id="prix-btn" onclick="prix.openSelection()">Enter Grand Prix</div>
            <div id="companion-list"></div>
        </aside>
    </div>

    <audio id="audio-stir" src="wood_stir_asmr.mp3" preload="auto"></audio>

    <script>
        const game = {
            energy: 0, lifetimeEnergy: 0, shards: 0,
            currentCPS: 0, paused: false, 
            passivePhase: 0, isClicking: false,
            maxChapterReached: 1, chapterMult: 1,

            companions: [
                { id: 0, name: 'Coco Mystic Octopus', cost: 15, power: 1, type: 'cps', count: 0, img: 'https://i.ibb.co/qMhJR7Hz/Coco-the-Mystic-Octopus.png', winMult: 1 },
                { id: 1, name: 'Baby Bunny Guide', cost: 100, power: 2, type: 'click', count: 0, img: 'https://i.ibb.co/1fbZZGT2/Baby-Bunny-the-Forest-Guide.png', winMult: 1 },
                { id: 2, name: 'Pio Pio Healing Chick', cost: 1100, power: 0.15, type: 'boost', count: 0, img: 'https://i.ibb.co/7sLrntn/Pio-Pio-the-Healing-Chick.png', winMult: 1 },
                { id: 3, name: 'Ivan Guardian Bear', cost: 12000, power: 50, type: 'cps', count: 0, img: 'https://i.ibb.co/LDZxCSvh/Ivan-the-Guardian-Bear.png', winMult: 1 }
            ],

            loreChapters: [
                { id: 1, threshold: 0, mult: 1, text: "SmallCreek skullchef has arrived on Planet Earth from Esquelotia. He is here to spread love through the ancestral Wooden Soup recipe." },
                { id: 2, threshold: 1000, mult: 2, text: "The ancient scroll reveals the past: In Esquelotia, a malignant entity was stealing compassion. Light was fading fast." },
                { id: 3, threshold: 50000, mult: 3, text: "Small Angel ascended the sacred mountain. He gave his physical life, transforming into a massive mantle of pure energy." },
                { id: 4, threshold: 500000, mult: 4, text: "Detecting dark energy on Earth, Skullchef embarked on this journey. His ingredients are infused with Small Angel's soul." },
                { id: 5, threshold: 1000000, mult: 5, text: "The soup has reached its limit. To release the mantle, you must activate the Awakening button and ascend." },
                { id: 6, text: "Success. Small Angel's energy is now woven into Earth. The second wave of purification begins now." }
            ],

            init() {
                this.canvas = document.getElementById('particle-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize(); window.onresize = () => this.resize();
                this.renderShop();
                setInterval(() => { if(!this.paused) this.logicTick(); }, 1000);
                setInterval(() => { if(!this.paused) this.uiTick(); }, 100);
                this.animationLoop();
            },

            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },

            logicTick() {
                let base = (this.companions[0].count * 1 * this.companions[0].winMult) + (this.companions[3].count * 50 * this.companions[3].winMult);
                let multiplier = 1 + (this.companions[2].count * 0.15 * this.companions[2].winMult) + (this.shards * 0.02);
                const finalCPS = base * multiplier;
                this.energy += finalCPS; this.lifetimeEnergy += finalCPS; this.currentCPS = finalCPS;
            },

            uiTick() {
                document.getElementById('energy-display').innerText = Math.floor(this.energy).toLocaleString();
                document.getElementById('cps-display').innerText = `EB PER SECOND: ${this.currentCPS.toFixed(1)}`;
                
                const goal = 25e6 * Math.pow(5, this.shards);
                const pBtn = document.getElementById('prestige-btn');
                if (this.energy >= goal) { pBtn.className = 'unlocked'; document.getElementById('prestige-text').innerText = "[ CLICK TO AWAKEN ]"; }
                else { pBtn.className = 'locked'; document.getElementById('prestige-text').innerText = `Requires ${goal.toLocaleString()} EB`; }

                this.updateLore();
                document.getElementById('prix-btn').style.display = this.companions[0].count > 0 ? 'block' : 'none';

                const cards = document.querySelectorAll('.companion-card');
                this.companions.forEach((c, i) => {
                    if (cards[i]) {
                        if (this.energy >= c.cost) cards[i].classList.add('affordable');
                        else cards[i].classList.remove('affordable');
                    }
                });
            },

            updateLore() {
                if (this.shards > 0) this.maxChapterReached = 6;
                else {
                    for(let i=0; i<5; i++) { if (this.lifetimeEnergy >= this.loreChapters[i].threshold) this.maxChapterReached = Math.max(this.maxChapterReached, i + 1); }
                }
                const ch = this.loreChapters[this.maxChapterReached - 1];
                document.getElementById('lore-text').innerText = ch.text;
                document.getElementById('lore-title').innerText = `Ancestral Scroll - Chapter ${this.maxChapterReached}`;
                this.chapterMult = ch.mult || 1;
            },

            handleManualClick(e) {
                if(this.paused || e.target.closest('#side-shop') || e.target.closest('#altar-panel')) return;
                this.isClicking = true;
                const clickVal = (this.chapterMult * Math.pow(2, this.companions[1].count * this.companions[1].winMult)) * (1 + (this.shards * 0.02));
                this.energy += clickVal; this.lifetimeEnergy += clickVal;

                const s = document.getElementById('audio-stir').cloneNode(); s.volume = 0.4; s.play().catch(()=>{});

                const spoon = document.getElementById('asset-spoon'); const soup = document.getElementById('asset-soup');
                spoon.classList.add('manual-stir'); soup.classList.add('soup-ripple-active');
                setTimeout(() => { spoon.classList.remove('manual-stir'); soup.classList.remove('soup-ripple-active'); this.isClicking = false; }, 120);

                this.createParticles(window.innerWidth/2, window.innerHeight/2 + 100, 'energy');
            },

            triggerSummon(comp) {
                const hero = document.createElement('img');
                hero.src = comp.img; hero.className = 'summon-clone'; hero.style.width = "300px";
                document.body.appendChild(hero);
                this.createParticles(window.innerWidth/2, window.innerHeight/2, 'magic');
                setTimeout(() => hero.classList.add('summon-active'), 20);
                setTimeout(() => {
                    const slotId = `slot-${comp.id}`;
                    let slot = document.getElementById(slotId);
                    if (!slot) {
                        slot = document.createElement('div'); slot.id = slotId; slot.className = 'companion-slot';
                        slot.innerHTML = `<img src="${comp.img}" class="slot-img"><div class="lv-badge">Lv. 0</div>`;
                        document.getElementById('companion-column').appendChild(slot);
                    }
                    const rect = slot.getBoundingClientRect();
                    hero.style.left = rect.left + 50 + 'px'; hero.style.top = rect.top + 50 + 'px';
                    hero.style.transform = 'translate(-50%, -50%) scale(0.35) rotate(0deg)';
                    setTimeout(() => { hero.remove(); slot.querySelector('.lv-badge').innerText = `Lv. ${comp.count}`; slot.classList.add('pulse-up'); setTimeout(() => slot.classList.remove('pulse-up'), 500); }, 1100);
                }, 1500);
            },

            buyCompanion(idx) {
                const c = this.companions[idx];
                if (this.energy >= c.cost) {
                    this.energy -= c.cost; c.count++; c.cost = Math.floor(c.cost * 1.35);
                    this.triggerSummon(c); this.renderShop();
                }
            },

            handlePrestigeClick() {
                const goal = 25e6 * Math.pow(5, this.shards);
                if (this.energy < goal) { document.getElementById('prestige-btn').classList.add('shake'); setTimeout(() => document.getElementById('prestige-btn').classList.remove('shake'), 300); return; }
                this.paused = true;
                const showcase = document.getElementById('angel-showcase'); showcase.classList.add('active');
                for(let i=0; i<15; i++) setTimeout(() => this.createParticles(window.innerWidth/2, window.innerHeight/2, 'magic'), i * 100);
                setTimeout(() => {
                    document.getElementById('white-out').style.opacity = '1';
                    setTimeout(() => {
                        this.shards++; this.energy = 0; this.lifetimeEnergy = 0;
                        this.companions.forEach(c => { c.count = 0; c.winMult = 1; c.cost = c.id === 0 ? 15 : (c.id === 1 ? 100 : (c.id === 2 ? 1100 : 12000)); });
                        document.getElementById('companion-column').innerHTML = '';
                        document.getElementById('angel-slot-permanent').style.display = 'flex';
                        document.getElementById('prestige-stat-text').style.display = 'block';
                        document.getElementById('prestige-stat-text').innerText = `Angel Awakening Lv. ${this.shards} (+${this.shards * 2}% Boost)`;
                        showcase.classList.remove('active'); this.renderShop();
                        document.getElementById('white-out').style.opacity = '0'; this.paused = false;
                    }, 1500);
                }, 2000);
            },

            animationLoop() {
                const spoon = document.getElementById('spoon-rig'); const soup = document.getElementById('asset-soup');
                if (!this.paused && this.currentCPS > 0 && !this.isClicking) {
                    const speed = 0.04 + (Math.log10(this.currentCPS + 1) * 0.05);
                    this.passivePhase += speed;
                    spoon.style.transform = `translate(-50%, -50%) rotate(${-27 + Math.sin(this.passivePhase) * 5}deg)`;
                    soup.style.transform = `translate(-50%, -50%) scaleY(${1 + Math.sin(this.passivePhase) * 0.012})`;
                }
                this.particleLoop(); requestAnimationFrame(() => this.animationLoop());
            },

            renderShop() {
                const list = document.getElementById('companion-list'); list.innerHTML = '';
                this.companions.forEach((c, i) => {
                    const card = document.createElement('div'); card.className = `companion-card ${this.energy >= c.cost ? 'affordable' : ''}`;
                    card.onclick = () => this.buyCompanion(i);
                    card.innerHTML = `<img src="${c.img}" class="comp-img"><div class="comp-info"><b>${c.name} (${c.count})</b><div style="font-size:0.75rem;color:#cbd5e1">${c.desc}</div><span class="comp-cost">${Math.floor(c.cost).toLocaleString()} EB</span></div>`;
                    list.appendChild(card);
                });
            },

            particles: [],
            createParticles(x, y, type) {
                const count = type === 'magic' ? 25 : 8;
                for(let i=0; i<count; i++) { this.particles.push({ x, y, type, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10 - (type==='energy'?5:0), life: 1, size: Math.random()*8+4, color: type==='magic'?(Math.random()>0.5?'#fff':'#fbbf24'):'#a5f3fc' }); }
            },
            particleLoop() {
                this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
                const tx = window.innerWidth/2, ty = 60;
                this.particles.forEach((p, i) => {
                    if(p.type === 'energy') { p.vx += (tx - p.x)*0.003; p.vy += (ty - p.y)*0.003; }
                    p.x += p.vx; p.y += p.vy; p.life -= 0.015;
                    this.ctx.fillStyle = p.color; this.ctx.globalAlpha = p.life;
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); this.ctx.fill();
                    if(p.life <= 0) this.particles.splice(i,1);
                });
                this.ctx.globalAlpha = 1;
            }
        };

        // --- PRIX MODULE FIXED ---
        const prix = {
            active: false, champion: null, racers: [], countdown: 3, tick: null,

            openSelection() {
                game.paused = true; 
                document.getElementById('race-modal').style.display = 'flex';
                document.getElementById('prix-selection-view').style.display = 'block';
                document.getElementById('prix-race-view').style.display = 'none';
                document.getElementById('prix-result-view').style.display = 'none';

                const list = document.getElementById('prix-selector-list'); 
                list.innerHTML = '';
                game.companions.filter(c => c.count > 0).forEach(c => {
                    const d = document.createElement('div');
                    d.className = 'prix-select-card';
                    d.innerHTML = `<img src="${c.img}" style="width:100px;"><p>${c.name}</p>`;
                    d.onclick = () => this.startRace(c); 
                    list.appendChild(d);
                });
            },

            startRace(c) {
                this.champion = c;
                document.getElementById('prix-selection-view').style.display = 'none';
                document.getElementById('prix-race-view').style.display = 'flex';
                
                for(let i=0; i<4; i++) document.getElementById(`lane-${i}`).innerHTML = '';

                this.racers = [ { id: c.id, pos: 0, img: c.img, isPlayer: true, lane: 0 }, 
                                ...game.companions.filter(co => co.id !== c.id).map((co, i) => ({ id: co.id, pos: 0, img: co.img, isPlayer: false, lane: i+1 })) ];
                
                this.racers.forEach(r => {
                    const img = document.createElement('img'); img.id = `racer-${r.lane}`; img.src = r.img; img.className = 'racer-img';
                    document.getElementById(`lane-${r.lane}`).appendChild(img);
                });

                this.countdown = 3;
                const cdBox = document.getElementById('prix-countdown');
                const cdItv = setInterval(() => {
                    cdBox.innerText = this.countdown > 0 ? this.countdown : "GO!";
                    if(this.countdown < 0) { clearInterval(cdItv); cdBox.innerText = ""; this.begin(); }
                    this.countdown--;
                }, 1000);
            },

            begin() {
                this.active = true;
                window.onmousedown = (e) => { 
                    if(this.active && !e.target.closest('#side-shop') && !e.target.closest('#prix-close-btn')) { 
                        this.racers[0].pos += 4.5; 
                        this.updatePos(); 
                    } 
                };
                this.tick = setInterval(() => { 
                    this.racers.slice(1).forEach(r => r.pos += Math.random() * 3.8); 
                    this.updatePos(); this.checkWin(); 
                }, 100);
            },

            updatePos() {
                this.racers.forEach(r => {
                    const el = document.getElementById(`racer-${r.lane}`);
                    if(el) el.style.bottom = (10 + (r.pos/100) * 75) + '%';
                });
            },

            checkWin() {
                const winner = this.racers.find(r => r.pos >= 100);
                if(winner) {
                    this.active = false; clearInterval(this.tick); window.onmousedown = null;
                    document.getElementById('prix-race-view').style.display = 'none';
                    document.getElementById('prix-result-view').style.display = 'block';
                    if(winner.isPlayer) {
                        document.getElementById('prix-rank').innerText = "1ST PLACE!";
                        document.getElementById('prix-reward').innerText = `VICTORY! ${this.champion.name} power DOUBLED!`;
                        this.champion.winMult = 2;
                    } else {
                        const con = Math.floor(25e6 * Math.pow(5, game.shards) * 0.01);
                        document.getElementById('prix-rank').innerText = "DEFEAT!";
                        document.getElementById('prix-reward').innerText = `Consolation: +${con.toLocaleString()} EB`;
                        game.energy += con;
                    }
                }
            },

            close() {
                this.active = false;
                clearInterval(this.tick);
                window.onmousedown = null;
                document.getElementById('race-modal').style.display = 'none';
                for(let i=0; i<4; i++) document.getElementById(`lane-${i}`).innerHTML = '';
                game.paused = false;
            }
        };

        window.onload = () => game.init();
    </script>
